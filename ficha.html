<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Meu Perfil Brazuguer - BRAZUG</title>
<link rel="stylesheet" href="/css/style.css">
<link rel="icon" href="/assets/branding/contentbra.png" type="image/png" />
<style>
    .prof-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
        gap: 20px;
        margin-top: 15px;
    }
    .prof-item {
        display: flex;
        align-items: flex-end;
        gap: 10px;
    }
    .prof-item div:first-child { flex: 1; }
    .prof-item div:last-child { width: 80px; }
    .prof-item label { font-size: 13px; color: var(--text-muted); }
</style>
</head>
<body>

<header class="site-header" id="universal-header"></header>

<div class="container">
    <h1 class="section-title">Meu Perfil e Personagens</h1>

    <div id="form-container">
        <div class="card" id="character-form-card">
            <h2 style="color: var(--gold); margin-bottom: 20px;">Criar/Editar Personagem</h2>
            
            <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px;">
                <div><label>Nome do Personagem</label><input type="text" id="name" style="width:100%; padding:8px; background:#111; border:1px solid #333; color:#fff; border-radius: 4px;"></div>
                <div>
                    <label>Classe</label>
                    <select id="class" style="width:100%; padding:8px; background:#111; border:1px solid #333; color:#fff; border-radius: 4px;">
                        <option>Warrior</option><option>Hunter</option><option>Rogue</option><option>Mage</option><option>Warlock</option><option>Priest</option><option>Druid</option><option>Shaman</option><option>Paladin</option>
                    </select>
                </div>
                <div>
                    <label>Raça</label>
                    <select id="race" style="width:100%; padding:8px; background:#111; border:1px solid #333; color:#fff; border-radius: 4px;">
                        <option>Orc</option><option>Troll</option><option>Tauren</option><option>Undead</option><option>Human</option><option>Dwarf</option><option>Night Elf</option><option>Gnome</option>
                    </select>
                </div>
                <div><label>Level</label><input type="number" id="level" value="1" min="1" max="60" style="width:100%; padding:8px; background:#111; border:1px solid #333; color:#fff; border-radius: 4px;"></div>
                <div><label>Guilda</label><input type="text" id="guild" value="BRAZUG" style="width:100%; padding:8px; background:#111; border:1px solid #333; color:#fff; border-radius: 4px;"></div>
                <div>
                    <label>Visibilidade</label>
                    <select id="visibility" style="width:100%; padding:8px; background:#111; border:1px solid #333; color:#fff; border-radius: 4px;">
                        <option value="public">Público</option><option value="private">Privado</option>
                    </select>
                </div>
                <div>
                    <label>Status</label>
                    <select id="status" style="width:100%; padding:8px; background:#111; border:1px solid #333; color:#fff; border-radius: 4px;">
                        <option value="alive">Vivo</option><option value="dead">Morto</option>
                    </select>
                </div>
            </div>
            
            <div style="margin-top: 30px;">
                <h3 style="color: var(--gold); margin-bottom: 5px;">Profissões</h3>
                <p style="font-size: 12px; color: var(--text-muted); margin-bottom: 15px;">Informe o nome e o nível atual da profissão (máx. 300)</p>
                
                <div class="prof-grid">
                    <!-- Primária 1 -->
                    <div class="prof-item">
                        <div>
                            <label>Primária 1</label>
                            <select id="prof1_name" style="width:100%; padding:8px; background:#111; border:1px solid #333; color:#fff; border-radius: 4px;">
                                <option value="">Nenhuma</option>
                                <option>Alchemy</option><option>Blacksmithing</option><option>Enchanting</option><option>Engineering</option>
                                <option>Herbalism</option><option>Leatherworking</option><option>Mining</option><option>Skinning</option><option>Tailoring</option>
                            </select>
                        </div>
                        <div>
                            <label>Lvl</label>
                            <input type="number" id="prof1_lvl" value="0" min="0" max="300" style="width:100%; padding:8px; background:#111; border:1px solid #333; color:#fff; border-radius: 4px;">
                        </div>
                    </div>

                    <!-- Primária 2 -->
                    <div class="prof-item">
                        <div>
                            <label>Primária 2</label>
                            <select id="prof2_name" style="width:100%; padding:8px; background:#111; border:1px solid #333; color:#fff; border-radius: 4px;">
                                <option value="">Nenhuma</option>
                                <option>Alchemy</option><option>Blacksmithing</option><option>Enchanting</option><option>Engineering</option>
                                <option>Herbalism</option><option>Leatherworking</option><option>Mining</option><option>Skinning</option><option>Tailoring</option>
                            </select>
                        </div>
                        <div>
                            <label>Lvl</label>
                            <input type="number" id="prof2_lvl" value="0" min="0" max="300" style="width:100%; padding:8px; background:#111; border:1px solid #333; color:#fff; border-radius: 4px;">
                        </div>
                    </div>

                    <!-- Cooking -->
                    <div class="prof-item">
                        <div><label>Culinária (Cooking)</label><input type="text" value="Cooking" disabled style="width:100%; padding:8px; background:#000; border:1px solid #222; color:#555; border-radius: 4px;"></div>
                        <div><label>Lvl</label><input type="number" id="prof_cooking_lvl" value="0" min="0" max="300" style="width:100%; padding:8px; background:#111; border:1px solid #333; color:#fff; border-radius: 4px;"></div>
                    </div>

                    <!-- First Aid -->
                    <div class="prof-item">
                        <div><label>Primeiros Socorros (First Aid)</label><input type="text" value="First Aid" disabled style="width:100%; padding:8px; background:#000; border:1px solid #222; color:#555; border-radius: 4px;"></div>
                        <div><label>Lvl</label><input type="number" id="prof_aid_lvl" value="0" min="0" max="300" style="width:100%; padding:8px; background:#111; border:1px solid #333; color:#fff; border-radius: 4px;"></div>
                    </div>

                    <!-- Fishing -->
                    <div class="prof-item">
                        <div><label>Pescaria (Fishing)</label><input type="text" value="Fishing" disabled style="width:100%; padding:8px; background:#000; border:1px solid #222; color:#555; border-radius: 4px;"></div>
                        <div><label>Lvl</label><input type="number" id="prof_fishing_lvl" value="0" min="0" max="300" style="width:100%; padding:8px; background:#111; border:1px solid #333; color:#fff; border-radius: 4px;"></div>
                    </div>
                </div>
            </div>

            <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; margin-top: 25px;">
                <div>
                    <label>Imagem do Personagem</label>
                    <input type="file" id="image_file" accept="image/*" style="width:100%; padding:8px; background:#111; border:1px solid #333; color:#fff; border-radius: 4px; margin-bottom: 10px;">
                    <input type="url" id="image_url" placeholder="Ou cole a URL da imagem aqui" style="width:100%; padding:8px; background:#111; border:1px solid #333; color:#fff; border-radius: 4px;">
                </div>
            </div>

            <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; margin-top: 25px;">
                <div>
                    <label>Twitch URL (opcional)</label>
                    <input type="url" id="twitch_url" placeholder="https://twitch.tv/seu-canal" style="width:100%; padding:8px; background:#111; border:1px solid #333; color:#fff; border-radius: 4px;">
                </div>
                <div>
                    <label>YouTube URL (opcional)</label>
                    <input type="url" id="youtube_url" placeholder="https://youtube.com/@seu-canal" style="width:100%; padding:8px; background:#111; border:1px solid #333; color:#fff; border-radius: 4px;">
                </div>
            </div>

            <div style="margin-top: 15px;">
                <label>Lore / História / Biografia</label>
                <textarea id="lore" placeholder="Conte a jornada deste herói..." style="width:100%; height:120px; padding:8px; background:#111; border:1px solid #333; color:#fff; border-radius: 4px;"></textarea>
            </div>
            <div style="display: flex; gap: 10px; margin-top: 20px;">
                <button id="btn-save" class="discord-btn" style="border: none; flex: 1; cursor: pointer;">Criar Personagem</button>
                <button id="btn-cancel-edit" class="discord-btn" style="border: none; background: #444; display: none; cursor: pointer;" onclick="location.reload()">Cancelar</button>
            </div>
        </div>
    </div>

    <div class="card" id="filter-panel" style="margin-top: 30px;">
        <h3 style="color: var(--gold); margin-bottom: 15px;">Filtros de Listagem</h3>
        <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px;">
            <select id="filter-class" style="padding:8px; background:#111; border:1px solid #333; color:#fff; border-radius: 4px;"><option value="">Todas as Classes</option><option>Warrior</option><option>Hunter</option><option>Rogue</option><option>Mage</option><option>Warlock</option><option>Priest</option><option>Druid</option><option>Shaman</option><option>Paladin</option></select>
            <select id="filter-race" style="padding:8px; background:#111; border:1px solid #333; color:#fff; border-radius: 4px;"><option value="">Todas as Raças</option><option>Orc</option><option>Troll</option><option>Tauren</option><option>Undead</option><option>Human</option><option>Dwarf</option><option>Night Elf</option><option>Gnome</option></select>
            <input type="text" id="filter-owner" placeholder="Filtrar por dono (Admin only)" style="display:none; padding:8px; background:#111; border:1px solid #333; color:#fff; border-radius: 4px;" />
        </div>
    </div>

    <div id="character-list-alive-section">
        <h2 class="section-title">Seus Personagens Ativos</h2>
        <div id="character-list-alive" class="grid-layout"></div>
    </div>

    <div id="character-list-dead-section" style="margin-top: 50px;">
        <h2 class="section-title fallen">Cemitério / Hall da Fama</h2>
        <div id="character-list-dead" class="grid-layout"></div>
    </div>
</div>

<script src="/js/models/CharacterModel.js"></script>
<script src="/js/views/CharacterView.js"></script>
<script src="/js/controllers/CharacterController.js"></script>
<script src="/js/header.js"></script>
</body>
</html>
