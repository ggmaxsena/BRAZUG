<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Armory — BRAZUG</title>
    <link rel="stylesheet" href="/css/style.css">
    <link rel="icon" href="/assets/branding/contentbra.png" type="image/png" />
    <script>var whTooltips = { colorLinks: true, iconizeLinks: true, renameLinks: true, domain: 'classic' };</script>
    <script src="https://wow.zamimg.com/js/tooltips.js"></script>
    <style>
        .armory-wrap { padding-bottom: 50px; }
        .hero-header-panel {
            background: linear-gradient(to bottom, rgba(196, 30, 58, 0.1), transparent);
            border-bottom: 1px solid var(--border);
            padding: 40px 0;
            margin-bottom: 40px;
        }
        .hero-header-content {
            display: flex;
            align-items: center;
            gap: 40px;
            flex-wrap: wrap;
        }
        .avatar-frame {
            width: 180px;
            height: 180px;
            border-radius: 20px;
            border: 2px solid var(--gold);
            overflow: hidden;
            background: #000;
            box-shadow: 0 0 30px rgba(247, 193, 77, 0.2);
        }
        .avatar-img { width: 100%; height: 100%; object-fit: cover; }
        
        .char-title {
            font-family: 'Cinzel', serif;
            font-size: 72px;
            font-weight: 900;
            text-transform: uppercase;
            font-style: italic;
            line-height: 0.9;
            color: #fff;
            text-shadow: 0 0 20px rgba(196, 30, 58, 0.5);
            margin-bottom: 10px;
        }
        .char-subtitle {
            font-size: 24px;
            color: var(--text-muted);
            font-weight: 300;
        }
        .char-subtitle b { color: #fff; font-weight: 700; }

        .armory-grid {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 40px;
        }
        @media (max-width: 1024px) {
            .armory-grid { grid-template-columns: 1fr; }
        }

        .gear-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 15px;
        }

        .item-link {
            background: rgba(12, 8, 8, 0.6);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 10px;
            display: flex;
            align-items: center;
            gap: 12px;
            transition: 0.2s;
            cursor: pointer;
            text-decoration: none !important;
        }
        .item-link:hover {
            border-color: var(--gold);
            background: rgba(196, 30, 58, 0.05);
            transform: translateX(5px);
        }

        .item-icon-box {
            width: 44px;
            height: 44px;
            border-radius: 8px;
            background: #000;
            border: 1px solid #333;
            overflow: hidden;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .item-icon-box img { width: 100%; height: 100%; object-fit: cover; }
        .item-icon-placeholder { font-size: 8px; font-weight: 900; color: #222; text-transform: uppercase; }

        .item-info-meta { font-size: 9px; font-weight: 800; text-transform: uppercase; color: var(--text-dim); line-height: 1; margin-bottom: 4px; }
        .item-info-name { font-size: 13px; font-weight: 700; line-height: 1.2; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        .stat-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 25px;
            position: relative;
        }
        .stat-line {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 0;
            border-bottom: 1px solid rgba(255,255,255,0.03);
        }
        .stat-line:last-child { border: none; }
        .stat-name { font-size: 11px; font-weight: 700; text-transform: uppercase; color: var(--text-muted); }
        .stat-val { font-size: 20px; font-weight: 900; font-style: italic; color: #fff; }

        .talent-box {
            background: rgba(0,0,0,0.4);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
        }
        .talent-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            border-bottom: 1px solid var(--border);
            padding-bottom: 10px;
        }
        .talent-header span { font-family: 'Cinzel', serif; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; }

        .talent-list { display: flex; flex-direction: column; gap: 8px; }
        .talent-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 6px 12px;
            border-radius: 6px;
            background: rgba(255,255,255,0.02);
            border: 1px solid rgba(255,255,255,0.05);
            transition: 0.2s;
            text-decoration: none !important;
        }
        .talent-item:hover { border-color: var(--horde-red); background: rgba(196, 30, 58, 0.05); }
        .talent-icon { width: 28px; height: 28px; border-radius: 4px; border: 1px solid #333; }
        .talent-name { font-size: 11px; color: #ccc; font-weight: 600; flex: 1; }
        .talent-rank { font-size: 10px; font-weight: 900; color: var(--gold); }

        /* ===================== SETS SYSTEM ===================== */
        .sets-fab {
            position: fixed;
            bottom: 32px;
            right: 32px;
            z-index: 9000;
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 12px;
        }
        .sets-fab-btn {
            width: 56px;
            height: 56px;
            border-radius: 50%;
            background: linear-gradient(135deg, #c41e3a, #8b0000);
            border: 2px solid var(--gold, #f7c14d);
            color: var(--gold, #f7c14d);
            font-size: 22px;
            cursor: pointer;
            box-shadow: 0 4px 24px rgba(196,30,58,0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            transition: 0.2s;
        }
        .sets-fab-btn:hover { transform: scale(1.1); box-shadow: 0 6px 32px rgba(196,30,58,0.8); }

        .sets-panel {
            position: fixed;
            bottom: 100px;
            right: 32px;
            width: 440px;
            max-height: 80vh;
            background: #0d0a0a;
            border: 1px solid #3a2020;
            border-radius: 16px;
            box-shadow: 0 8px 40px rgba(0,0,0,0.8), 0 0 0 1px rgba(247,193,77,0.1);
            z-index: 8999;
            display: none;
            flex-direction: column;
            overflow: hidden;
        }
        .sets-panel.open { display: flex; }

        .sets-panel-header {
            padding: 20px 24px 16px;
            border-bottom: 1px solid #2a1a1a;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-shrink: 0;
        }
        .sets-panel-title {
            font-family: 'Cinzel', serif;
            font-size: 14px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--gold, #f7c14d);
        }
        .sets-close-btn {
            background: none; border: none; color: #666; font-size: 18px; cursor: pointer; padding: 4px;
            border-radius: 4px; transition: 0.2s;
        }
        .sets-close-btn:hover { color: #fff; background: rgba(255,255,255,0.05); }

        .sets-save-area {
            padding: 16px 24px;
            border-bottom: 1px solid #1a1010;
            flex-shrink: 0;
            background: rgba(196,30,58,0.04);
        }
        .sets-save-area label {
            display: block;
            font-size: 9px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: #555;
            margin-bottom: 8px;
        }
        .sets-save-row { display: flex; gap: 8px; }
        .sets-input {
            flex: 1;
            background: rgba(255,255,255,0.04);
            border: 1px solid #2a1a1a;
            border-radius: 8px;
            padding: 10px 14px;
            color: #fff;
            font-size: 13px;
            font-family: inherit;
            outline: none;
            transition: 0.2s;
        }
        .sets-input:focus { border-color: var(--gold, #f7c14d); background: rgba(247,193,77,0.04); }
        .sets-input::placeholder { color: #333; }
        .sets-save-btn {
            background: linear-gradient(135deg, #c41e3a, #8b0000);
            border: 1px solid rgba(247,193,77,0.3);
            border-radius: 8px;
            color: var(--gold, #f7c14d);
            font-size: 11px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1px;
            padding: 10px 16px;
            cursor: pointer;
            transition: 0.2s;
            white-space: nowrap;
        }
        .sets-save-btn:hover { background: linear-gradient(135deg, #e02244, #a00000); }
        .sets-save-btn:disabled { opacity: 0.4; cursor: not-allowed; }

        .sets-list-area {
            flex: 1;
            overflow-y: auto;
            padding: 12px 24px 24px;
            scrollbar-width: thin;
            scrollbar-color: #3a2020 transparent;
        }
        .sets-empty {
            text-align: center;
            padding: 40px 0;
            color: #333;
            font-size: 12px;
            font-style: italic;
        }
        .sets-empty-icon { font-size: 32px; margin-bottom: 12px; opacity: 0.3; }

        .set-card {
            background: rgba(255,255,255,0.02);
            border: 1px solid #1f1212;
            border-radius: 10px;
            margin-bottom: 10px;
            overflow: hidden;
            transition: 0.2s;
        }
        .set-card:hover { border-color: #3a2020; }
        .set-card.active-set { border-color: rgba(247,193,77,0.4); background: rgba(247,193,77,0.03); }

        .set-card-header {
            display: flex;
            align-items: center;
            padding: 14px 16px;
            gap: 12px;
            cursor: pointer;
        }
        .set-card-avatar {
            width: 36px;
            height: 36px;
            border-radius: 6px;
            background: #1a0a0a;
            border: 1px solid #2a1a1a;
            overflow: hidden;
            flex-shrink: 0;
        }
        .set-card-avatar img { width: 100%; height: 100%; object-fit: cover; }
        .set-card-info { flex: 1; min-width: 0; }
        .set-card-name {
            font-size: 13px;
            font-weight: 700;
            color: #fff;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .set-card-meta {
            font-size: 10px;
            color: #555;
            margin-top: 2px;
        }
        .set-card-meta b { color: #888; }

        .set-card-actions { display: flex; gap: 6px; flex-shrink: 0; }
        .set-action-btn {
            background: none;
            border: 1px solid #2a1a1a;
            border-radius: 6px;
            color: #555;
            font-size: 11px;
            padding: 5px 9px;
            cursor: pointer;
            transition: 0.2s;
        }
        .set-action-btn:hover { border-color: var(--gold, #f7c14d); color: var(--gold, #f7c14d); }
        .set-action-btn.danger:hover { border-color: #c41e3a; color: #c41e3a; }

        .set-card-body {
            padding: 0 16px 14px;
            border-top: 1px solid #1a0a0a;
            display: none;
        }
        .set-card-body.expanded { display: block; }

        .set-stats-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 6px;
            margin-top: 12px;
        }
        .set-stat-chip {
            background: rgba(0,0,0,0.4);
            border: 1px solid #1f1212;
            border-radius: 6px;
            padding: 6px 10px;
            text-align: center;
        }
        .set-stat-chip-label { font-size: 8px; text-transform: uppercase; letter-spacing: 1px; color: #444; font-weight: 700; }
        .set-stat-chip-val { font-size: 14px; font-weight: 900; color: #fff; margin-top: 2px; }

        .set-gear-preview {
            margin-top: 12px;
            display: flex;
            flex-wrap: wrap;
            gap: 4px;
        }
        .set-gear-icon {
            width: 28px;
            height: 28px;
            border-radius: 4px;
            background: #0d0808;
            border: 1px solid #2a1a1a;
            overflow: hidden;
        }
        .set-gear-icon img { width: 100%; height: 100%; object-fit: cover; }

        .set-talents-preview {
            margin-top: 12px;
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }
        .set-talent-chip {
            background: rgba(196,30,58,0.08);
            border: 1px solid rgba(196,30,58,0.2);
            border-radius: 20px;
            padding: 4px 10px;
            font-size: 10px;
            font-weight: 700;
            color: #e88;
        }

        .sets-count-badge {
            position: absolute;
            top: -4px;
            right: -4px;
            background: var(--gold, #f7c14d);
            color: #000;
            font-size: 9px;
            font-weight: 900;
            width: 18px;
            height: 18px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        @media (max-width: 768px) {
            .sets-panel { width: calc(100vw - 32px); right: 16px; }
            .sets-fab { right: 16px; bottom: 20px; }
        }
    </style>
</head>
<body class="armory-wrap">

<header class="site-header" id="universal-header"></header>

<div id="armory-loading" style="text-align: center; padding: 150px 0;">
    <h2 class="section-title">Sincronizando Herói...</h2>
    <p class="subtitle">Aguarde enquanto consultamos os arquivos da Horda</p>
</div>

<div id="armory-error" style="text-align: center; padding: 150px 0; display: none;">
    <h2 class="section-title fallen">Personagem não encontrado</h2>
    <p class="subtitle">Este herói pode ainda não ter sido registrado ou estar abaixo do nível 10.</p>
    <a href="/" class="btn-secondary" style="margin-top: 20px;">Voltar ao Início</a>
</div>

<div id="armory-content" style="display: none;">
    <div class="hero-header-panel">
        <div class="redesign-container hero-header-content">
            <div class="avatar-frame" id="char-avatar-box"></div>
            <div class="char-info">
                <div style="display: flex; align-items: center; gap: 15px;">
                    <h1 class="char-title" id="char-name"></h1>
                    <div id="status-badge" class="bg-green-500/20 border border-green-500/50 text-green-500 px-3 py-1 rounded-full text-[10px] font-black uppercase tracking-widest" style="background: rgba(46, 204, 113, 0.1); border: 1px solid rgba(46, 204, 113, 0.3); color: #2ecc71;">
                        Herói Ativo
                    </div>
                </div>
                <p class="char-subtitle" id="char-meta"></p>
                <div style="margin-top: 15px; display: flex; gap: 20px;">
                    <span id="char-guild" style="color: #3498db; font-weight: 900; text-transform: uppercase; font-size: 14px; letter-spacing: 1px;"></span>
                    <a id="char-lore-link" href="#" class="btn-search" style="font-size: 11px; padding: 5px 15px;">📜 Ver Crônica</a>
                </div>
            </div>
        </div>
    </div>

    <div class="redesign-container armory-grid">
        <div class="main-column">
            <div class="panel">
                <div class="corner corner-tl"></div>
                <div class="corner corner-tr"></div>
                <div class="corner corner-bl"></div>
                <div class="corner corner-br"></div>
                <div class="panel-title">Equipamento</div>
                <div class="section">
                    <div class="gear-grid" id="gear-grid"></div>
                </div>
            </div>

            <div class="panel">
                <div class="corner corner-tl"></div>
                <div class="corner corner-tr"></div>
                <div class="corner corner-bl"></div>
                <div class="corner corner-br"></div>
                <div class="panel-title">Talentos</div>
                <div class="section">
                    <div class="grid-2" id="talents-container"></div>
                </div>
            </div>
        </div>

        <aside class="side-column">
            <div class="panel">
                <div class="corner corner-tl"></div>
                <div class="corner corner-tr"></div>
                <div class="corner corner-bl"></div>
                <div class="corner corner-br"></div>
                <div class="panel-title">Atributos</div>
                <div class="section" id="stats-container"></div>
            </div>

            <div class="panel">
                <div class="corner corner-tl"></div>
                <div class="corner corner-tr"></div>
                <div class="corner corner-bl"></div>
                <div class="corner corner-br"></div>
                <div class="panel-title">Profissões</div>
                <div class="section" id="professions-container"></div>
            </div>
        </aside>
    </div>
</div>

<!-- ===================== SETS FLOATING PANEL ===================== -->
<div class="sets-panel" id="sets-panel">
    <div class="sets-panel-header">
        <span class="sets-panel-title">⚔️ Meus Sets</span>
        <button class="sets-close-btn" onclick="toggleSetsPanel()">✕</button>
    </div>
    <div class="sets-save-area">
        <label>Salvar configuração atual como set</label>
        <div class="sets-save-row">
            <input type="text" class="sets-input" id="set-name-input" placeholder="Nome do set (ex: PvP BM, Raid SV...)" maxlength="40">
            <button class="sets-save-btn" id="sets-save-btn" onclick="saveCurrentSet()" disabled>
                + Salvar
            </button>
        </div>
    </div>
    <div class="sets-list-area" id="sets-list"></div>
</div>

<div class="sets-fab">
    <button class="sets-fab-btn" onclick="toggleSetsPanel()" id="sets-fab-btn" title="Meus Sets" style="position:relative;">
        🛡
        <span class="sets-count-badge" id="sets-count-badge" style="display:none;">0</span>
    </button>
</div>

<script src="/js/header.js"></script>
<script>
(function() {
    const pathParts = window.location.pathname.split('/').filter(p => p !== "");
    const name = pathParts[pathParts.length - 1];
    const realm = pathParts[pathParts.length - 2] || 'doomhowl';
    
    const rarityColors = { 'POOR': '#9d9d9d', 'COMMON': '#ffffff', 'UNCOMMON': '#1eff00', 'RARE': '#0070dd', 'EPIC': '#a335ee', 'LEGENDARY': '#ff8000', 'ARTIFACT': '#e6cc80', 'HEIRLOOM': '#00ccff' };
    const slotNames = { 
        'HEAD': 'Cabeça', 'NECK': 'Pescoço', 'SHOULDER': 'Ombros', 'SHIRT': 'Camisa', 'CHEST': 'Torso', 'WAIST': 'Cintura', 
        'LEGS': 'Pernas', 'FEET': 'Pés', 'WRIST': 'Pulsos', 'HANDS': 'Mãos', 'FINGER_1': 'Anel 1', 'FINGER_2': 'Anel 2', 
        'TRINKET_1': 'Berloque 1', 'TRINKET_2': 'Berloque 2', 'BACK': 'Costas', 'MAIN_HAND': 'Mão Princ.', 'OFF_HAND': 'Mão Sec.', 
        'RANGED': 'À Distância', 'TABARD': 'Tabardo' 
    };
    const slots = [
        'HEAD', 'NECK', 'SHOULDER', 'BACK', 'CHEST', 'SHIRT', 'TABARD', 'WRIST',
        'HANDS', 'WAIST', 'LEGS', 'FEET', 'FINGER_1', 'FINGER_2', 'TRINKET_1', 'TRINKET_2',
        'MAIN_HAND', 'OFF_HAND', 'RANGED'
    ];

    async function loadData(attempt = 0) {
        try {
            const res = await fetch(`/api/armory/full/${realm}/${name}`);
            if (res.status === 503 && attempt < 5) {
                setTimeout(() => loadData(attempt + 1), 3000);
                return;
            }
            if (!res.ok) throw new Error("Erro");
            render(await res.json());
        } catch(e) {
            document.getElementById('armory-loading').style.display = 'none';
            document.getElementById('armory-error').style.display = 'block';
        }
    }

    function render(char) {
        document.getElementById('armory-loading').style.display = 'none';
        document.getElementById('armory-content').style.display = 'block';

        // Header
        document.getElementById('char-name').textContent = char.name;
        document.getElementById('char-meta').innerHTML = `Level <b>${char.level}</b> ${char.race} <b>${char.class}</b>`;
        document.getElementById('char-guild').textContent = char.guild ? `<${char.guild}>` : '';
        document.getElementById('char-avatar-box').innerHTML = `<img src="${char.avatarUrl || '/assets/branding/contentbra.png'}" class="avatar-img" onerror="this.src='/assets/branding/contentbra.png'">`;
        document.getElementById('char-lore-link').href = `/personagem.html?name=${char.name}`;

        // Gear
        const gearContainer = document.getElementById('gear-grid');
        gearContainer.innerHTML = slots.map(slot => {
            const item = char.items.find(i => i.slot === slot);
            const color = item?.quality ? rarityColors[item.quality] : '#1a1a1a';
            const iconUrl = item?.icon ? `https://render.worldofwarcraft.com/classic1x-us/icons/56/${item.icon}.jpg` : null;
            
            return `
                <a class="item-link" 
                   href="${item ? `https://www.wowhead.com/classic/item=${item.itemId}` : '#'}"
                   data-wowhead="${item ? `item=${item.itemId}&domain=classic` : ''}"
                   target="_blank">
                    <div class="item-icon-box" style="${item ? `border-color: ${color}44; box-shadow: inset 0 0 10px ${color}22;` : ''}">
                        ${iconUrl ? `<img src="${iconUrl}" onerror="this.style.display='none'">` : `<span class="item-icon-placeholder">${slot.substring(0,4)}</span>`}
                    </div>
                    <div class="min-w-0">
                        <div class="item-info-meta">${slotNames[slot] || slot}</div>
                        <div class="item-info-name" style="color: ${item ? color : '#333'}">${item?.name || 'Vazio'}</div>
                    </div>
                </a>
            `;
        }).join('');

        // Stats
        const stats = char.extra_data?.statistics || {};
        const statsContainer = document.getElementById('stats-container');
        statsContainer.innerHTML = `
            <div class="stat-line"><span class="stat-name">Vida</span><span class="stat-val" style="color:#2ecc71;">${stats.health || '--'}</span></div>
            <div class="stat-line"><span class="stat-name">Poder</span><span class="stat-val" style="color:#3498db;">${stats.power || '--'}</span></div>
            <div class="stat-line"><span class="stat-name">Força</span><span class="stat-val">${stats.strength?.effective || '--'}</span></div>
            <div class="stat-line"><span class="stat-name">Agilidade</span><span class="stat-val">${stats.agility?.effective || '--'}</span></div>
            <div class="stat-line"><span class="stat-name">Intelecto</span><span class="stat-val">${stats.intellect?.effective || '--'}</span></div>
            <div class="stat-line"><span class="stat-name">Vigor</span><span class="stat-val">${stats.stamina?.effective || '--'}</span></div>
        `;

        // Talents
        const talentsContainer = document.getElementById('talents-container');
        const groups = char.extra_data?.specializations?.specialization_groups || [];
        talentsContainer.innerHTML = groups.flatMap(g => g.specializations).map(s => {
            const pts = s.talents?.reduce((acc, t) => acc + (t.talent_rank || 1), 0) || 0;
            return `
                <div class="talent-box">
                    <div class="talent-header">
                        <span>${s.specialization_name}</span>
                        <span style="color: var(--gold);">${pts} pts</span>
                    </div>
                    <div class="talent-list">
                        ${s.talents?.map(t => {
                            const spellId = t.spell_tooltip?.spell?.id;
                            const icon = t.talent.icon ? `https://render.worldofwarcraft.com/classic1x-us/icons/56/${t.talent.icon}.jpg` : null;
                            return `
                                <a href="https://www.wowhead.com/classic/spell=${spellId}" 
                                   data-wowhead="spell=${spellId}&domain=classic" 
                                   class="talent-item" target="_blank">
                                    <img src="${icon}" class="talent-icon" onerror="this.src='/assets/branding/contentbra.png'">
                                    <span class="talent-name">${t.talent.name}</span>
                                    <span class="talent-rank">${t.talent_rank}</span>
                                </a>
                            `;
                        }).join('') || '<div style="font-size:10px; color:#444; font-style:italic;">Nenhum ponto gasto</div>'}
                    </div>
                </div>
            `;
        }).join('');

        // Professions
        const profsContainer = document.getElementById('professions-container');
        const profs = char.professions || [];
        profsContainer.innerHTML = profs.map(p => `
            <div class="stat-line">
                <span class="stat-name">${p.name}</span>
                <span class="stat-val" style="font-size: 14px;">${p.skillPoints} / ${p.maxSkillPoints}</span>
            </div>
        `).join('') || '<p style="color:#444; font-size:12px; font-style:italic;">Nenhuma profissão ativa.</p>';

        if (window.$WowheadPower) window.$WowheadPower.refreshLinks();

        // Enable Sets system with loaded data
        if (typeof enableSetSave === 'function') enableSetSave(char);
    }

    loadData();
})();
</script>
<script>
// ===================== SETS SYSTEM =====================
const SETS_KEY = 'brazug_char_sets';
let _currentCharData = null;

function getSets() {
    try { return JSON.parse(localStorage.getItem(SETS_KEY) || '[]'); } catch { return []; }
}
function saveSets(sets) {
    localStorage.setItem(SETS_KEY, JSON.stringify(sets));
}

function updateSetsBadge() {
    const sets = getSets();
    const badge = document.getElementById('sets-count-badge');
    if (sets.length > 0) {
        badge.textContent = sets.length;
        badge.style.display = 'flex';
    } else {
        badge.style.display = 'none';
    }
}

function toggleSetsPanel() {
    const panel = document.getElementById('sets-panel');
    panel.classList.toggle('open');
    if (panel.classList.contains('open')) renderSetsList();
}

function saveCurrentSet() {
    const nameInput = document.getElementById('set-name-input');
    const name = nameInput.value.trim();
    if (!name || !_currentCharData) return;

    const char = _currentCharData;
    const stats = char.extra_data?.statistics || {};
    const groups = char.extra_data?.specializations?.specialization_groups || [];
    const talents = groups.flatMap(g => g.specializations).map(s => ({
        name: s.specialization_name,
        pts: s.talents?.reduce((acc, t) => acc + (t.talent_rank || 1), 0) || 0
    }));

    const set = {
        id: Date.now(),
        name,
        savedAt: new Date().toISOString(),
        char: {
            name: char.name,
            level: char.level,
            race: char.race,
            class: char.class,
            guild: char.guild,
            avatarUrl: char.avatarUrl
        },
        stats: {
            health: stats.health,
            power: stats.power,
            strength: stats.strength?.effective,
            agility: stats.agility?.effective,
            intellect: stats.intellect?.effective,
            stamina: stats.stamina?.effective,
        },
        talents,
        gear: (char.items || []).map(i => ({
            slot: i.slot,
            name: i.name,
            quality: i.quality,
            icon: i.icon,
            itemId: i.itemId
        }))
    };

    const sets = getSets();
    sets.unshift(set);
    saveSets(sets);
    nameInput.value = '';
    updateSetsBadge();
    renderSetsList();

    // Feedback visual
    const btn = document.getElementById('sets-save-btn');
    btn.textContent = '✓ Salvo!';
    btn.style.background = 'linear-gradient(135deg, #1a8a4a, #0d5a2e)';
    setTimeout(() => {
        btn.textContent = '+ Salvar';
        btn.style.background = '';
    }, 2000);
}

function deleteSet(id) {
    const sets = getSets().filter(s => s.id !== id);
    saveSets(sets);
    updateSetsBadge();
    renderSetsList();
}

function toggleSetCard(id) {
    const body = document.getElementById(`set-body-${id}`);
    if (body) body.classList.toggle('expanded');
}

function renderSetsList() {
    const container = document.getElementById('sets-list');
    const sets = getSets();

    if (sets.length === 0) {
        container.innerHTML = `
            <div class="sets-empty">
                <div class="sets-empty-icon">🛡️</div>
                <div>Nenhum set salvo ainda.</div>
                <div style="margin-top:6px; font-size:10px;">Carregue um personagem e salve sua configuração atual.</div>
            </div>`;
        return;
    }

    const rarityColors = { 'POOR': '#9d9d9d', 'COMMON': '#ffffff', 'UNCOMMON': '#1eff00', 'RARE': '#0070dd', 'EPIC': '#a335ee', 'LEGENDARY': '#ff8000' };
    const isActive = _currentCharData?.name;

    container.innerHTML = sets.map(set => {
        const date = new Date(set.savedAt).toLocaleDateString('pt-BR', { day:'2-digit', month:'2-digit', year:'2-digit' });
        const gearIcons = set.gear.slice(0, 12).map(item => {
            const color = rarityColors[item.quality] || '#333';
            const iconUrl = item.icon ? `https://render.worldofwarcraft.com/classic1x-us/icons/56/${item.icon}.jpg` : null;
            return `<div class="set-gear-icon" style="border-color:${color}44;" title="${item.name || item.slot}">
                ${iconUrl ? `<img src="${iconUrl}" onerror="this.style.opacity='0'">` : ''}
            </div>`;
        }).join('');

        const talentChips = set.talents?.filter(t => t.pts > 0).map(t =>
            `<span class="set-talent-chip">${t.name} <b>${t.pts}</b></span>`
        ).join('') || '<span style="color:#333; font-size:10px; font-style:italic;">Sem talentos</span>';

        const isCurrentChar = isActive && isActive.toLowerCase() === set.char.name.toLowerCase();

        return `
        <div class="set-card ${isCurrentChar ? 'active-set' : ''}" id="set-card-${set.id}">
            <div class="set-card-header" onclick="toggleSetCard(${set.id})">
                <div class="set-card-avatar">
                    <img src="${set.char.avatarUrl || '/assets/branding/contentbra.png'}" onerror="this.src='/assets/branding/contentbra.png'">
                </div>
                <div class="set-card-info">
                    <div class="set-card-name">${set.name}</div>
                    <div class="set-card-meta">
                        <b>${set.char.name}</b> · Lv${set.char.level} ${set.char.race} ${set.char.class} · ${date}
                    </div>
                </div>
                <div class="set-card-actions">
                    <button class="set-action-btn" title="Detalhes" onclick="event.stopPropagation(); toggleSetCard(${set.id})">▾</button>
                    <button class="set-action-btn danger" title="Deletar" onclick="event.stopPropagation(); deleteSet(${set.id})">✕</button>
                </div>
            </div>

            <div class="set-card-body" id="set-body-${set.id}">
                <div class="set-stats-grid">
                    <div class="set-stat-chip">
                        <div class="set-stat-chip-label">Vida</div>
                        <div class="set-stat-chip-val" style="color:#2ecc71;">${set.stats.health || '—'}</div>
                    </div>
                    <div class="set-stat-chip">
                        <div class="set-stat-chip-label">Poder</div>
                        <div class="set-stat-chip-val" style="color:#3498db;">${set.stats.power || '—'}</div>
                    </div>
                    <div class="set-stat-chip">
                        <div class="set-stat-chip-label">Vigor</div>
                        <div class="set-stat-chip-val">${set.stats.stamina || '—'}</div>
                    </div>
                    <div class="set-stat-chip">
                        <div class="set-stat-chip-label">Força</div>
                        <div class="set-stat-chip-val">${set.stats.strength || '—'}</div>
                    </div>
                    <div class="set-stat-chip">
                        <div class="set-stat-chip-label">Agilidade</div>
                        <div class="set-stat-chip-val">${set.stats.agility || '—'}</div>
                    </div>
                    <div class="set-stat-chip">
                        <div class="set-stat-chip-label">Intelecto</div>
                        <div class="set-stat-chip-val">${set.stats.intellect || '—'}</div>
                    </div>
                </div>

                <div style="font-size:9px; text-transform:uppercase; letter-spacing:1px; color:#444; font-weight:700; margin-top:14px; margin-bottom:6px;">Equipamento</div>
                <div class="set-gear-preview">${gearIcons}</div>

                <div style="font-size:9px; text-transform:uppercase; letter-spacing:1px; color:#444; font-weight:700; margin-top:14px; margin-bottom:6px;">Talentos</div>
                <div class="set-talents-preview">${talentChips}</div>
            </div>
        </div>`;
    }).join('');
}

// Enable save button when char is loaded
function enableSetSave(charData) {
    _currentCharData = charData;
    const btn = document.getElementById('sets-save-btn');
    if (btn) btn.disabled = false;
    updateSetsBadge();
}

// Init
updateSetsBadge();
document.getElementById('set-name-input')?.addEventListener('keydown', e => {
    if (e.key === 'Enter') saveCurrentSet();
});
</script>
</body>
</html>
