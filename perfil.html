<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Perfil — BRAZUG</title>
    <link rel="stylesheet" href="/css/style.css" />
    <link rel="icon" href="/assets/branding/contentbra.png" type="image/png" />
  </head>
  <body>
    <header class="site-header" id="universal-header"></header>

    <main class="redesign-container">
      <div class="panel" id="profile-panel">
        <div class="corner corner-tl"></div>
        <div class="corner corner-tr"></div>
        <div class="corner corner-bl"></div>
        <div class="corner corner-br"></div>

        <div class="panel-title">Meu Perfil</div>
        <div class="panel-subtitle">Gerencie suas informações de conta e segurança</div>

        <div class="section">
            <div id="user-info" style="margin-bottom: 20px;">
                <p><strong>Usuário:</strong> <span id="profile-username" style="color: var(--gold);"></span></p>
                <p><strong>Cargo:</strong> <span id="profile-role" style="color: var(--horde-red); font-weight: bold; text-transform: uppercase;"></span></p>
            </div>
        </div>

        <div class="divider"></div>

        <div class="section">
          <div class="section-heading">Segurança</div>
          <div class="section-sub">Atualize sua senha periodicamente para manter sua conta protegida</div>
          <form id="password-form" style="display: flex; flex-direction: column; gap: 15px; max-width: 450px;">
            <input type="password" name="oldPassword" placeholder="Senha atual" required />
            <input type="password" name="newPassword" placeholder="Nova senha" required />
            <input type="password" name="confirmPassword" placeholder="Confirmar nova senha" required />
            <button type="submit" class="btn-primary">Alterar Senha</button>
          </form>
          <p id="password-msg" hidden style="margin-top: 15px; font-weight: bold;"></p>
        </div>

        <div class="divider"></div>

        <div class="section" style="display: flex; gap: 15px; flex-wrap: wrap;">
            <div id="admin-actions" hidden>
                <a href="/cadastro-aventura.html" class="btn-secondary">Cadastrar Nova Aventura</a>
            </div>
            <a href="/ficha.html" class="btn-primary" style="background: linear-gradient(135deg, #b08d00, #f7c14d); color: #000; border-color: #000;">Gerenciar Personagens</a>
        </div>
      </div>

      <div class="panel" style="margin-top: 2rem;">
        <div class="corner corner-tl"></div>
        <div class="corner corner-tr"></div>
        <div class="corner corner-bl"></div>
        <div class="corner corner-br"></div>
        <div class="panel-title">Minhas Aventuras</div>
        <div class="section">
            <ul id="user-adventures-list" style="list-style: none; display: flex; flex-direction: column; gap: 10px;"></ul>
        </div>
      </div>
    </main>

    <script src="/js/auth-guard.js"></script>
    <script src="/js/models/ProfileModel.js"></script>
    <script src="/js/views/ProfileView.js"></script>
    <script src="/js/controllers/ProfileController.js"></script>
    <script src="/js/header.js"></script>
  </body>
</html>
