<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Perfil — BRAZUG</title>
    <link rel="stylesheet" href="/css/style.css" />
    <link rel="icon" href="/assets/branding/contentbra.png" type="image/png" />
  </head>
  <body>
    <header class="site-header" id="universal-header"></header>

    <main class="container">
      <section id="profile-panel" class="card">
        <h2 class="section-title">Meu Perfil</h2>
        <div id="user-info" style="margin-bottom: 30px;">
          <p><strong>Usuário:</strong> <span id="profile-username"></span></p>
          <p><strong>Cargo:</strong> <span id="profile-role"></span></p>
        </div>

        <div style="margin-top: 2rem;">
          <h3 style="color: var(--gold); margin-bottom: 15px;">Segurança</h3>
          <form id="password-form" style="display: flex; flex-direction: column; gap: 15px; max-width: 400px;">
            <input type="password" name="oldPassword" placeholder="Senha atual" required style="padding: 10px; background: #111; border: 1px solid #333; color: #fff; border-radius: 6px;" />
            <input type="password" name="newPassword" placeholder="Nova senha" required style="padding: 10px; background: #111; border: 1px solid #333; color: #fff; border-radius: 6px;" />
            <input type="password" name="confirmPassword" placeholder="Confirmar nova senha" required style="padding: 10px; background: #111; border: 1px solid #333; color: #fff; border-radius: 6px;" />
            <button type="submit" class="discord-btn" style="border: none; width: 100%;">Alterar Senha</button>
          </form>
          <p id="password-msg" hidden style="margin-top: 10px;"></p>
        </div>

        <div id="admin-actions" style="margin-top: 30px;" hidden>
          <h3 style="color: var(--gold); margin-bottom: 15px;">Ações Rápidas</h3>
          <a href="/cadastro-aventura.html" class="discord-btn" style="display: inline-block;">Cadastrar Nova Aventura</a>
        </div>
        <div style="margin-top: 30px;">
          <a href="/ficha.html" class="discord-btn" style="display: inline-block; background: var(--gold); color: #000;">Gerenciar Personagens</a>
        </div>
      </section>

      <section class="card" style="margin-top: 2rem;">
        <h2 class="section-title" style="font-size: 28px;">Minhas Aventuras</h2>
        <ul id="user-adventures-list" style="list-style: none;"></ul>
      </section>
    </main>

    <script src="/js/auth-guard.js"></script>
    <script src="/js/models/ProfileModel.js"></script>
    <script src="/js/views/ProfileView.js"></script>
    <script src="/js/controllers/ProfileController.js"></script>
    <script src="/js/header.js"></script>
  </body>
</html>
