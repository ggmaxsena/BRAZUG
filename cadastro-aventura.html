<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cadastro de Aventura — BRAZUG</title>
    <link rel="stylesheet" href="/css/style.css" />
    <link rel="icon" href="/assets/branding/contentbra.png" type="image/png" />
    <link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">
    <style>
      .ql-toolbar.ql-snow {
        background: #222;
        border-color: #333;
      }
      .ql-container.ql-snow {
        border-color: #333;
      }
      .ql-snow .ql-stroke {
        stroke: #fff;
      }
      .ql-snow .ql-fill {
        fill: #fff;
      }
      .ql-snow .ql-picker {
        color: #fff;
      }
      .ql-snow .ql-picker-options {
        background-color: #222;
        border: 1px solid #333;
      }
      .ql-editor {
        font-size: 16px;
        line-height: 1.6;
      }
      .ql-editor.ql-blank::before {
        color: #666;
      }
    </style>
  </head>
  <body>
    <header class="site-header" id="universal-header"></header>
    
    <main class="redesign-container">
      <div class="panel">
        <div class="corner corner-tl"></div>
        <div class="corner corner-tr"></div>
        <div class="corner corner-bl"></div>
        <div class="corner corner-br"></div>

        <div class="panel-title">Nova Aventura</div>
        <div class="panel-subtitle">Registre suas crônicas e imortalize seus feitos na Horda</div>

        <div class="section">
            <form id="adventure-form" style="display: flex; flex-direction: column; gap: 20px;">
              <div class="grid-2">
                <div><label>Título *</label><input type="text" name="title" placeholder="Ex: A Queda de Ragefire" required maxlength="120"></div>
                <div><label>Data</label><input type="date" name="event_date"></div>
              </div>
              
              <div>
                  <label>Autor / Personagem (Selecione da lista ou digite um novo)</label>
                  <input type="text" name="author" id="author-input" list="characters-list" placeholder="Digite o nome do herói autor desta história..." required>
                  <datalist id="characters-list"></datalist>
              </div>

              <div>
                  <label>História *</label>
                  <div id="editor-container" style="min-height: 300px;"></div>
                  <input type="hidden" name="body">
              </div>
              
              <div class="divider"></div>

              <div class="section-heading">Imagem & Visibilidade</div>

              <div class="upload-area" onclick="document.querySelector('input[name=image_file]').click()">
                  <div class="upload-icon">📜</div>
                  <div class="upload-text">Clique para selecionar uma imagem da aventura</div>
                  <div class="upload-sub">PNG, JPG ou GIF · máx. 5MB</div>
                  <input type="file" name="image_file" accept="image/*" style="display:none" onchange="if(this.files[0]) alert('Imagem selecionada: ' + this.files[0].name)">
              </div>
              
              <div class="or-divider"><div class="or-line"></div><div class="or-text">OU URL</div><div class="or-line"></div></div>
              <input type="url" name="image_url" placeholder="https://example.com/imagem-aventura.jpg">
              
              <div>
                  <label>Vídeo de destaque (YouTube ou clipe Twitch)</label>
                  <input type="url" name="video_url" placeholder="Cole o link do vídeo (opcional)...">
              </div>

              <div style="display: flex; justify-content: space-between; align-items: center; margin-top: 15px;">
                <label style="display: flex; align-items: center; gap: 10px; cursor: pointer;">
                    <input type="checkbox" name="published" checked style="width: 20px; height: 20px;"> 
                    Publicar no mural
                </label>
                <label style="display: flex; align-items: center; gap: 10px;">Visibilidade
                  <select name="visibility" id="visibility-select" style="width: auto; padding: 5px 15px;">
                    <option value="public" selected>Pública</option>
                  </select>
                </label>
              </div>

              <button type="submit" class="btn-primary" style="margin-top: 10px;">⚔ Salvar Aventura</button>
            </form>
        </div>

        <!-- LISTA DE GERENCIAMENTO (PARA STAFF) -->
        <div id="staff-management" hidden>
            <div class="divider"></div>
            <div class="section">
                <div class="section-heading">Gerenciar Aventuras</div>
                <div style="background: rgba(0,0,0,0.3); padding: 15px; border-radius: 8px; border: 1px solid var(--border);">
                    <ul id="admin-list" style="list-style: none; display: flex; flex-direction: column; gap: 10px;"></ul>
                </div>
            </div>
        </div>

        <div class="section" style="background: rgba(0,0,0,0.2);">
            <a href="/admin.html" id="back-to-admin" class="btn-secondary">← Voltar ao painel</a>
        </div>
      </div>
    </main>

    <script src="https://cdn.quilljs.com/1.3.6/quill.js"></script>
    <script src="/js/models/AdminModel.js"></script>
    <script src="/js/views/AdminView.js"></script>
    <script src="/js/controllers/AdminController.js"></script>
    <script src="/js/header.js"></script>
    <script>
      document.addEventListener("DOMContentLoaded", () => {
        const role = localStorage.getItem("brazug_admin_role");
        if (role === 'admin' || role === 'guildmaster') {
            const select = document.getElementById('visibility-select');
            const opt = document.createElement('option');
            opt.value = 'shadow';
            opt.textContent = 'Shadow / Sombras';
            select.appendChild(opt);
        }
      });
    </script>
  </body>
</html>
