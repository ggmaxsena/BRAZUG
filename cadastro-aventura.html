<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cadastro de Aventura — BRAZUG</title>
    <link rel="stylesheet" href="/css/style.css" />
    <link rel="icon" href="/assets/branding/contentbra.png" type="image/png" />
    <!-- Editor.js Core and Plugins -->
    <script src="https://cdn.jsdelivr.net/npm/@editorjs/editorjs@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/@editorjs/header@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/@editorjs/list@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/@editorjs/image@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/@editorjs/quote@latest"></script>

    <style>
      /* Editor.js Styling */
      #editor-container {
        background: #111;
        border: 1px solid #333;
        border-radius: 4px;
        padding: 20px;
        color: #fff;
        min-height: 300px;
      }
      .ce-block__content, .ce-toolbar__content {
        max-width: 900px; /* Melhor largura para escrita */
      }
      .ce-paragraph {
        font-size: 16px;
        line-height: 1.6;
      }
      .ce-header {
        color: var(--gold);
        padding: 1em 0;
      }
      .cdx-input {
        background: #222 !important;
        border: 1px solid #444 !important;
        color: #fff !important;
      }
      .ce-toolbar__plus, .ce-toolbar__settings-btn {
        background-color: #333;
        color: #fff;
      }
      .ce-toolbar__plus:hover, .ce-toolbar__settings-btn:hover {
        background-color: #444;
      }
      .ce-popover {
        background-color: #222;
        border: 1px solid #444;
      }
      .ce-popover__item-icon {
        background: #333;
        color: #fff;
      }
      .ce-popover__item:hover {
        background: #333;
      }
      .ce-popover__item-label {
        color: #fff;
      }
      .ce-inline-toolbar {
        background-color: #222;
        border: 1px solid #444;
      }
      .ce-inline-tool {
        color: #fff;
      }
      .ce-inline-tool:hover {
        background-color: #333;
      }
    </style>
  </head>
  <body>
    <header class="site-header" id="universal-header"></header>
    
    <main class="container">
      <section class="card">
        <h2 class="section-title">Nova Aventura</h2>
        <form id="adventure-form" style="display: flex; flex-direction: column; gap: 20px;">
          <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
            <div><label>Título *</label><input type="text" name="title" required maxlength="120" style="width: 100%; padding: 10px; background: #111; border: 1px solid #333; color: #fff;"></div>
            <div><label>Data</label><input type="date" name="event_date" style="width: 100%; padding: 10px; background: #111; border: 1px solid #333; color: #fff;"></div>
          </div>
          
          <div>
              <label>Autor / Personagem (Selecione da lista ou digite um novo)</label>
              <input type="text" name="author" id="author-input" list="characters-list" placeholder="Digite o nome do herói autor desta história..." required style="width: 100%; padding: 10px; background: #111; border: 1px solid #333; color: #fff;">
              <datalist id="characters-list"></datalist>
          </div>

          <div>
              <label>História * (Escrita por blocos - use o botão + ou barra de espaço)</label>
              <div id="editor-container"></div>
              <input type="hidden" name="body">
          </div>
          
          <div>
              <label>Imagem da Aventura</label>
              <input type="file" name="image_file" accept="image/*" style="width: 100%; padding: 10px; background: #111; border: 1px solid #333; color: #fff; margin-bottom: 10px;">
              <input type="url" name="image_url" placeholder="Ou cole a URL da imagem aqui" style="width: 100%; padding: 10px; background: #111; border: 1px solid #333; color: #fff;">
          </div>
          
          <div style="display: flex; justify-content: space-between; align-items: center;">
            <label><input type="checkbox" name="published" checked /> Publicar no mural</label>
            <label>Visibilidade
              <select name="visibility" id="visibility-select" style="padding: 5px; background: #111; border: 1px solid #333; color: #fff;">
                <option value="public" selected>Pública</option>
              </select>
            </label>
          </div>

          <button type="submit" class="discord-btn" style="border: none; width: 100%; cursor: pointer;">Salvar Aventura</button>
        </form>
        <div style="margin-top: 30px; border-top: 1px solid #333; padding-top: 20px;">
            <a href="/admin.html" style="color: var(--gold);">← Voltar ao painel</a>
        </div>
      </section>
    </main>

    <script src="/js/models/AdminModel.js"></script>
    <script src="/js/controllers/AdminController.js"></script>
    <script src="/js/header.js"></script>
    <script>
      document.addEventListener("DOMContentLoaded", () => {
        const role = localStorage.getItem("brazug_admin_role");
        if (role === 'admin' || role === 'guildmaster') {
            const select = document.getElementById('visibility-select');
            const opt = document.createElement('option');
            opt.value = 'shadow';
            opt.textContent = 'Shadow / Sombras';
            select.appendChild(opt);
        }
      });
    </script>
  </body>
</html>
