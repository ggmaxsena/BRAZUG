<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin — Mural BRAZUG</title>

    <link rel="stylesheet" href="css/style.css" />
    <link rel="stylesheet" href="css/admin.css" />

    <link rel="icon" href="assets/branding/contentbra.png" type="image/png" />
  </head>

  <body class="admin-page">
    <header class="admin-header">
      <a href="/" class="logo">
        <img class="logo-img" src="assets/branding/contentbra.png" alt="BRAZUG" width="36" height="36" />
        <span class="logo-text">BRAZUG Admin</span>
      </a>

      <div class="header-user-info">
        <div id="user-badge" class="user-badge" hidden>
          <span id="user-display-name" class="user-name">Usuário</span>
          <span id="user-display-role" class="user-role">Cargo</span>
        </div>
        <a href="/ficha.html" class="btn btn-secondary" style="margin-right: 10px; text-decoration: none; line-height: 1.5;">Ficha WoW</a>
        <button type="button" id="btn-logout" class="btn btn-secondary" hidden>Sair</button>
      </div>
    </header>

    <main class="admin-main">
      <!-- LOGIN / REGISTER -->
      <section id="login-panel" class="admin-card admin-login">
        <h1 id="auth-title">Mural de Aventuras</h1>

        <p id="auth-hint" class="admin-hint">Acesso restrito a oficiais da guilda.</p>

        <!-- FORM LOGIN -->
        <form id="login-form">
          <label>
            Usuário
            <input type="text" id="login-username" required autocomplete="username" />
          </label>

          <label>
            Senha
            <input type="password" id="login-password" required autocomplete="current-password" />
          </label>

          <button type="submit" class="btn btn-horde">Entrar</button>
          
          <p style="margin-top: 1.5rem; font-size: 0.85rem;">
            Não tem conta? <a href="#" id="toggle-to-register" style="color: var(--gold-light);">Cadastre-se aqui</a>
          </p>
        </form>

        <!-- FORM REGISTER (hidden) -->
        <form id="register-form" hidden>
          <label>
            Novo Usuário
            <input type="text" id="reg-username" required />
          </label>

          <label>
            Senha
            <input type="password" id="reg-password" required />
          </label>

          <label>
            Palavra-passe da Guilda
            <input type="password" id="reg-secret" required placeholder="Fornecida pelo líder" />
          </label>

          <button type="submit" class="btn btn-secondary">Criar minha conta</button>

          <p style="margin-top: 1.5rem; font-size: 0.85rem;">
            Já tem conta? <a href="#" id="toggle-to-login" style="color: var(--gold-light);">Voltar ao login</a>
          </p>
        </form>

        <p id="auth-error" class="admin-error" hidden></p>
        <p id="auth-success" class="admin-msg" style="color: #2d6a3e;" hidden></p>
      </section>

      <!-- DASHBOARD -->
      <section id="dashboard-panel" class="admin-dashboard" hidden>
        <!-- GESTÃO DE USUÁRIOS (ADMIN ONLY) -->
        <div id="users-panel" class="admin-card" hidden>
          <h2>Gerenciar usuários</h2>
          
          <form id="user-form" class="admin-form">
            <div class="form-row">
              <label>
                Novo usuário
                <input type="text" name="username" required />
              </label>
              <label>
                Senha
                <input type="password" name="password" required />
              </label>
              <label>
                Role
                <select name="role">
                  <option value="admin">Admin</option>
                  <option value="guildmaster">Guildmaster</option>
                  <option value="officer">Officer</option>
                  <option value="guildmember">Guildmember</option>
                </select>
              </label>
            </div>
            <button type="submit" class="btn btn-secondary">Criar usuário</button>
          </form>

          <ul id="users-list" class="admin-list" style="margin-top: 20px;"></ul>
        </div>

        <!-- NOVA AVENTURA -->
        <div id="adventure-panel" class="admin-card">
          <h2>Nova aventura</h2>

          <form id="adventure-form" class="admin-form">
            <div class="form-row">
              <label>
                Título *

                <input type="text" name="title" required maxlength="120" />
              </label>

              <label>
                Data

                <input type="date" name="event_date" />
              </label>
            </div>

            <label>
              Autor / personagem

              <input type="text" name="author" maxlength="80" placeholder="Ex.: Thrall — Líder" />
            </label>

            <label>
              História *

              <textarea name="body" rows="6" required maxlength="4000"></textarea>
            </label>

            <label>
              URL da imagem

              <input type="url" name="image_url" placeholder="https://..." />
            </label>

            <label class="checkbox-label">
              <input type="file" name="image_file" accept="image/*" />

              ou envie arquivo (máx. 5 MB)
            </label>

            <!-- PUBLICAÇÃO -->
            <label class="checkbox-label">
              <input type="checkbox" name="published" checked />

              Publicar no mural
            </label>

            <!-- VISIBILIDADE -->
            <label>
              Tipo da aventura

              <select name="visibility">
                <option value="public" selected>Pública</option>

                <option value="shadow">Shadow / Sombras</option>
              </select>
            </label>

            <button type="submit" class="btn btn-horde">Salvar aventura</button>

            <p id="form-msg" class="admin-msg" hidden></p>
          </form>
        </div>

        <!-- LISTA -->
        <div class="admin-card">
          <h2>Aventuras cadastradas</h2>

          <ul id="admin-list" class="admin-list"></ul>
        </div>
      </section>
    </main>

    <script src="js/admin.js"></script>
  </body>
</html>
