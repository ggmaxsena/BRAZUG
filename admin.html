<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Painel Administrativo — BRAZUG</title>
    <link rel="stylesheet" href="css/style.css" />
    <link rel="stylesheet" href="css/admin.css" />
    <link rel="icon" href="assets/branding/contentbra.png" type="image/png" />
    <style>
      #user-edit-modal[hidden] { display: none !important; }
    </style>
  </head>
  <body class="admin-page">
    <header id="universal-header"></header>

    <main class="admin-main">
      <section id="dashboard-panel" class="admin-dashboard" hidden>
        <div id="users-panel" class="admin-card" hidden>
          <h2>Gestão de Usuários</h2>
          <form id="user-form" class="admin-form">
            <div class="form-row">
              <label>Nome <input type="text" name="username" required /></label>
              <label>Senha <input type="password" name="password" required /></label>
              <label>Cargo
                <select name="role">
                  <option value="admin">Admin</option>
                  <option value="guildmaster">Guildmaster</option>
                  <option value="officer">Officer</option>
                  <option value="guildmember">Guildmember</option>
                </select>
              </label>
            </div>
            <button type="submit" class="btn btn-secondary">Adicionar Usuário</button>
          </form>
          <input type="text" id="user-search" placeholder="Buscar por nome..." style="width: 100%; padding: 0.8rem; margin-top: 1rem;" />
          <ul id="users-list" class="admin-list" style="margin-top: 1rem;"></ul>
        </div>

        <div id="logs-panel" class="admin-card" hidden>
          <h2>Relatório do Sistema</h2>
          <ul id="logs-list" class="admin-list"></ul>
        </div>

        <div class="admin-card">
          <h2>Conteúdo</h2>
          <a href="/cadastro-aventura.html" class="btn btn-secondary">Nova Aventura</a>
          <ul id="admin-list" class="admin-list" style="margin-top: 1rem;"></ul>
        </div>
      </section>
    </main>

    <!-- User Edit Modal -->
    <div id="user-edit-modal" class="modal" hidden onclick="if(event.target==this) this.hidden=true">
        <div class="modal-content">
            <h2>Editar Usuário</h2>
            <form id="user-edit-form" class="admin-form">
                <input type="hidden" id="edit-user-id" />
                <label>Nome <input type="text" id="edit-username" required /></label>
                <label>Nova Senha (deixar vazio para manter)<input type="password" id="edit-password" /></label>
                <label>Cargo
                    <select id="edit-role">
                        <option value="admin">Admin</option>
                        <option value="guildmaster">Guildmaster</option>
                        <option value="officer">Officer</option>
                        <option value="guildmember">Guildmember</option>
                    </select>
                </label>
                <div style="margin-top: 1rem; display: flex; gap: 10px;">
                    <button type="submit" class="btn btn-secondary">Salvar Alterações</button>
                    <button type="button" class="btn btn-small" onclick="closeUserEditModal()">Cancelar</button>
                </div>
                </form>
                </div>
                </div>

                <script>
                function closeUserEditModal() {
                console.log("Fechando modal...");
                document.getElementById('user-edit-modal').hidden = true;
                }
                </script>
    <script src="js/models/AdminModel.js"></script>
    <script src="js/views/AdminView.js"></script>
    <script src="js/controllers/AdminController.js"></script>
    <script src="js/header.js"></script>
  </body>
</html>
