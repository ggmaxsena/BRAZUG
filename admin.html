<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Painel Administrativo — BRAZUG</title>
    <link rel="stylesheet" href="/css/style.css" />
    <link rel="icon" href="/assets/branding/contentbra.png" type="image/png" />
  </head>
  <body>
    <header class="site-header" id="universal-header"></header>

    <main class="redesign-container">
      <section id="dashboard-panel" hidden>
        <!-- GESTÃO DE USUÁRIOS -->
        <div id="users-panel" class="panel" hidden>
          <div class="corner corner-tl"></div>
          <div class="corner corner-tr"></div>
          <div class="corner corner-bl"></div>
          <div class="corner corner-br"></div>
          
          <div class="panel-title">Gestão de Usuários</div>
          <div class="panel-subtitle">Controle de acesso e cargos da guilda</div>

          <div class="section">
              <form id="user-form" style="display: flex; flex-direction: column; gap: 15px;">
                <div class="grid-2">
                  <div><label>Nome</label><input type="text" name="username" required placeholder="Nome do usuário"></div>
                  <div><label>E-mail</label><input type="email" name="email" placeholder="email@exemplo.com"></div>
                </div>
                <div class="grid-2">
                  <div><label>Senha</label><input type="password" name="password" required placeholder="••••••••"></div>
                  <div>
                    <label>Cargo</label>
                    <select name="role">
                      <option value="admin">Admin</option>
                      <option value="guildmaster">Guildmaster</option>
                      <option value="officer">Officer</option>
                      <option value="guildmember">Guildmember</option>
                    </select>
                  </div>
                </div>
                <button type="submit" class="btn-primary">⚔ Adicionar Usuário</button>
              </form>
          </div>
          
          <div class="divider"></div>

          <div class="section">
              <input type="text" id="user-search" placeholder="Buscar por nome..." style="margin-bottom: 15px;">
              <ul id="users-list" style="list-style: none; display: flex; flex-direction: column; gap: 8px;"></ul>
          </div>
        </div>

        <!-- RELATÓRIO -->
        <div id="logs-panel" class="panel" hidden>
          <div class="corner corner-tl"></div>
          <div class="corner corner-tr"></div>
          <div class="corner corner-bl"></div>
          <div class="corner corner-br"></div>
          <div class="panel-title">Relatório do Sistema</div>
          <div class="section">
              <ul id="logs-list" style="list-style: none; display: flex; flex-direction: column; gap: 5px; font-family: monospace; font-size: 13px;"></ul>
          </div>
        </div>

        <!-- CONTEÚDO -->
        <div class="panel">
          <div class="corner corner-tl"></div>
          <div class="corner corner-tr"></div>
          <div class="corner corner-bl"></div>
          <div class="corner corner-br"></div>
          <div class="panel-title">Aventuras</div>
          <div class="panel-subtitle">Gerenciar crônicas e histórias do mural</div>
          <div class="section">
              <a href="/cadastro-aventura.html" class="btn-secondary" style="margin-bottom: 20px;">Nova Aventura</a>
              <ul id="admin-list" style="list-style: none; display: flex; flex-direction: column; gap: 10px;"></ul>
          </div>
        </div>
      </section>
    </main>

    <!-- MODAL DE EDIÇÃO -->
    <div id="user-edit-modal" class="mural-modal" hidden onclick="if(event.target==this) this.hidden=true">
        <div class="mural-modal-panel" style="padding: 30px;">
            <button type="button" class="mural-modal-close" onclick="document.getElementById('user-edit-modal').hidden = true">×</button>
            <h2>Editar Usuário</h2>
            <form id="user-edit-form" style="display: flex; flex-direction: column; gap: 15px; margin-top: 20px;">
                <input type="hidden" id="edit-user-id" />
                <label>Nome</label><input type="text" id="edit-username" required style="padding: 10px; background: #111; border: 1px solid #333; color: #fff;" />
                <label>E-mail</label><input type="email" id="edit-email" style="padding: 10px; background: #111; border: 1px solid #333; color: #fff;" />
                <label>Nova Senha (vazio para manter)</label><input type="password" id="edit-password" style="padding: 10px; background: #111; border: 1px solid #333; color: #fff;" />
                <label>Cargo</label>
                <select id="edit-role" style="padding: 10px; background: #111; border: 1px solid #333; color: #fff;">
                    <option value="admin">Admin</option>
                    <option value="guildmaster">Guildmaster</option>
                    <option value="officer">Officer</option>
                    <option value="guildmember">Guildmember</option>
                </select>
                <div style="margin-top: 20px; display: flex; gap: 10px;">
                    <button type="submit" class="discord-btn" style="border: none;">Salvar Alterações</button>
                    <button type="button" class="discord-btn" style="background: #444; border: none;" onclick="document.getElementById('user-edit-modal').hidden = true">Cancelar</button>
                </div>
            </form>
        </div>
    </div>

    <!-- MODAL DE PREVIEW DA AVENTURA -->
    <div id="mural-modal" class="mural-modal" hidden>
      <div class="mural-modal-backdrop" data-action="close"></div>
      <div class="mural-modal-panel">
        <button type="button" class="mural-modal-close" data-action="close">×</button>
        <img id="mural-modal-img" class="mural-modal-img" src="" alt="" />
        <div class="mural-modal-copy">
          <p id="mural-modal-date"></p>
          <h2 id="mural-modal-title"></h2>
          <div id="mural-modal-body" class="mural-modal-body"></div>
          <p id="mural-modal-author" style="font-weight: bold; color: var(--gold);"></p>
        </div>
      </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/dompurify/3.0.9/purify.min.js"></script>

    <script src="/js/models/AdminModel.js"></script>
    <script src="/js/views/AdminView.js"></script>
    <script src="/js/controllers/AdminController.js"></script>
    <script src="/js/header.js"></script>
  </body>
</html>
