<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redefinir Senha — BRAZUG</title>
    <link rel="stylesheet" href="/css/style.css">
    <link rel="icon" href="/assets/branding/contentbra.png" type="image/png" />
</head>
<body>
    <header class="site-header" id="universal-header"></header>

    <main class="container">
      <section class="card" style="max-width: 500px; margin: 50px auto;">
        <h2 class="section-title">Nova Senha</h2>
        <form id="reset-form" style="display: flex; flex-direction: column; gap: 15px;">
          <div>
            <label>Nova Senha</label>
            <input type="password" name="password" required style="width: 100%; padding: 12px; background: #111; border: 1px solid #333; color: #fff; border-radius: 6px;">
          </div>
          <div>
            <label>Confirmar Nova Senha</label>
            <input type="password" name="confirm" required style="width: 100%; padding: 12px; background: #111; border: 1px solid #333; color: #fff; border-radius: 6px;">
          </div>
          <button type="submit" class="discord-btn" style="width: 100%; border: none; cursor: pointer; margin-top: 10px;">Alterar Senha</button>
          <p id="reset-msg" style="text-align: center; margin-top: 10px;" hidden></p>
        </form>
      </section>
    </main>

    <script src="/js/header.js"></script>
    <script>
        const params = new URLSearchParams(window.location.search);
        const token = params.get("token");

        if (!token) {
            document.body.innerHTML = '<div style="text-align:center; padding:100px;"><h1>Token inválido</h1><a href="/login.html">Voltar</a></div>';
        }

        document.getElementById("reset-form").onsubmit = async (e) => {
            e.preventDefault();
            const msg = document.getElementById("reset-msg");
            const fd = new FormData(e.target);
            const password = fd.get("password");
            const confirm = fd.get("confirm");

            if (password !== confirm) {
                msg.style.color = "var(--horde-red)";
                msg.textContent = "As senhas não coincidem.";
                msg.hidden = false;
                return;
            }

            try {
                const res = await fetch("/api/auth/reset-password", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ token, password })
                });
                const resData = await res.json();
                
                if (res.ok) {
                    msg.style.color = "var(--gold)";
                    msg.textContent = "Senha alterada! Redirecionando...";
                    msg.hidden = false;
                    setTimeout(() => window.location.href = "/login.html", 2000);
                } else {
                    throw new Error(resData.error);
                }
            } catch (err) {
                msg.style.color = "var(--horde-red)";
                msg.textContent = err.message;
                msg.hidden = false;
            }
        };
    </script>
</body>
</html>
