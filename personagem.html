<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Detalhes do Herói - BRAZUG</title>
<link rel="stylesheet" href="/css/style.css">
</head>
<body>

<header class="site-header" id="universal-header"></header>

<div class="container" id="hero-detail">
    <p style="text-align: center; color: #888;">Carregando herói...</p>
</div>

<script src="/js/header.js"></script>
<script>
(function() {
    const params = new URLSearchParams(window.location.search);
    const id = params.get('id');

    async function loadDetail() {
        if(!id) return;
        try {
            const res = await fetch(`/api/characters`); 
            const chars = await res.json();
            const char = chars.find(c => c.id === id);

            if(!char) {
                document.getElementById('hero-detail').innerHTML = '<h1>Herói não encontrado</h1>';
                return;
            }

            render(char);
        } catch(e) {
            console.error(e);
        }
    }

    function render(char) {
        const container = document.getElementById('hero-detail');
        
        let deathHtml = "";
        if(char.is_dead) {
            deathHtml = `
            <div class="card" style="border-color: var(--horde-red); background: rgba(196, 30, 58, 0.05); margin-bottom: 30px;">
                <h3 style="margin:0; color: var(--horde-red); font-size: 24px;">FALECIDO HEROICAMENTE NO LV ${char.death_level || char.level}</h3>
                <p style="margin:10px 0 0 0; color: #ffaaaa;"><b>Causa:</b> ${char.death_cause || 'Desconhecida'} | <b>Local:</b> ${char.death_location || 'Desconhecido'}</p>
            </div>
            `;
        }

        const profs = [];
        if(char.prof1_name) profs.push({name: char.prof1_name, lvl: char.prof1_lvl});
        if(char.prof2_name) profs.push({name: char.prof2_name, lvl: char.prof2_lvl});
        if(char.prof_cooking_lvl > 0) profs.push({name: "Cooking", lvl: char.prof_cooking_lvl});
        if(char.prof_aid_lvl > 0) profs.push({name: "First Aid", lvl: char.prof_aid_lvl});
        if(char.prof_fishing_lvl > 0) profs.push({name: "Fishing", lvl: char.prof_fishing_lvl});

        const profsHtml = profs.map(p => `
            <div style="background: #111; border: 1px solid #333; padding: 10px 15px; border-radius: 8px; display: flex; justify-content: space-between; align-items: center; min-width: 150px;">
                <span style="font-weight: bold; color: ${p.lvl >= 300 ? 'var(--gold)' : '#fff'}">${p.name}</span>
                <span style="color: var(--gold); font-weight: 900;">${p.lvl}</span>
            </div>
        `).join('');

        container.innerHTML = `
            ${deathHtml}
            <div class="card">
                <div style="display: flex; gap: 40px; flex-wrap: wrap; align-items: flex-start;">
                    <img src="${char.image_url || '/assets/branding/contentbra.png'}" style="width: 350px; height: 350px; object-fit: cover; border-radius: 12px; border: 1px solid var(--border); box-shadow: 0 10px 40px rgba(0,0,0,0.6);">
                    <div style="flex: 1; min-width: 300px;">
                        <p class="eyebrow" style="color: var(--gold); margin-bottom: 10px;">Herói de Brazug</p>
                        <h1 style="font-size: 56px; margin-bottom: 5px; color: var(--gold); line-height: 1.1;">${char.name}</h1>
                        <p style="font-size: 24px; color: var(--text-muted); margin-bottom: 10px;">Level ${char.is_dead ? (char.death_level || char.level) : char.level} ${char.class}</p>
                        <p style="color: var(--text-muted); font-size: 18px;">${char.race} | ${char.guild}</p>
                        <p style="font-size: 14px; margin-top: 25px; color: #888;">Criado por: <b style="color: var(--text);">${char.owner_username || 'Brazuguer'}</b></p>
                        
                        <div style="display: flex; gap: 15px; margin-top: 30px;">
                            ${!char.is_dead ? `<a href="https://classic-armory.org/character/us/classic-hardcore/doomhowl/${char.name.toLowerCase()}" target="_blank" class="discord-btn" style="background: var(--gold); color: #000; border: none;">Classic Armory</a>` : ''}
                            ${char.twitch_url ? `<a href="${char.twitch_url}" target="_blank" class="discord-btn" style="background: #9146ff; border: none;">Twitch</a>` : ''}
                        </div>
                    </div>
                </div>

                <div style="margin-top: 50px; border-top: 1px solid #333; padding-top: 40px;">
                    <h2 style="color: var(--gold); font-size: 28px; margin-bottom: 20px;">Lore / Biografia</h2>
                    <div style="line-height: 2; color: #ccc; white-space: pre-wrap; font-style: italic; font-size: 18px;">${char.lore || 'Este herói ainda não registrou sua história...'}</div>
                </div>

                <div style="margin-top: 40px;">
                    <h2 style="color: var(--gold); font-size: 28px; margin-bottom: 20px;">Profissões e Habilidades</h2>
                    <div style="display: flex; flex-wrap: wrap; gap: 15px;">
                        ${profsHtml || '<p style="color: #666;">Nenhuma profissão registrada.</p>'}
                    </div>
                </div>
            </div>
        `;
    }

    loadDetail();
})();
</script>
</body>
</html>
