<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Detalhes do Herói - BRAZUG</title>
<link rel="stylesheet" href="/css/style.css">
<style>
    body { background: #070304; color: #eee; font-family: Inter, sans-serif; padding-top: 100px; }
    .hero-detail-container { max-width: 800px; margin: auto; padding: 20px; }
    .hero-header { display: flex; gap: 30px; align-items: flex-start; margin-bottom: 40px; flex-wrap: wrap; }
    .hero-img { width: 300px; height: 300px; object-fit: cover; border-radius: 12px; border: 2px solid #333; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
    .hero-info-top h1 { font-size: 42px; color: #00ff88; margin: 0; }
    .hero-info-top p { font-size: 18px; color: #aaa; margin: 5px 0; }
    .death-marker { background: #440000; color: #ffaaaa; padding: 15px; border-radius: 8px; border: 1px solid #660000; margin-bottom: 20px; }
    .info-card { background: rgba(255,255,255,0.05); padding: 25px; border-radius: 12px; border: 1px solid #222; margin-bottom: 20px; }
    .info-card h2 { color: #00ff88; margin-top: 0; font-size: 20px; border-bottom: 1px solid #333; padding-bottom: 10px; margin-bottom: 20px; }
    .prof-list { display: flex; flex-wrap: wrap; gap: 10px; }
    .prof-tag { background: #1a1a1a; padding: 6px 12px; border-radius: 20px; border: 1px solid #333; font-size: 14px; }
    .prof-tag.full { border-color: #00ff88; color: #00ff88; font-weight: bold; }
    .social-btns { display: flex; gap: 10px; margin-top: 20px; }
    .btn-social { padding: 10px 20px; border-radius: 6px; text-decoration: none; color: #fff; font-weight: bold; font-size: 14px; flex: 1; text-align: center; }
    .lore-text { line-height: 1.8; color: #ccc; white-space: pre-wrap; font-style: italic; }
</style>
</head>
<body>

<header id="universal-header"></header>

<div class="hero-detail-container" id="hero-detail">
    <p style="text-align: center; color: #888;">Carregando herói...</p>
</div>

<script src="/js/header.js"></script>
<script>
(function() {
    const params = new URLSearchParams(window.location.search);
    const id = params.get('id');

    async function loadDetail() {
        if(!id) return;
        try {
            const res = await fetch(`/api/characters`); // Buscamos todos e filtramos (simples)
            const chars = await res.json();
            const char = chars.find(c => c.id === id);

            if(!char) {
                document.getElementById('hero-detail').innerHTML = '<h1>Herói não encontrado</h1>';
                return;
            }

            render(char);
        } catch(e) {
            console.error(e);
        }
    }

    function render(char) {
        const container = document.getElementById('hero-detail');
        
        let deathHtml = "";
        if(char.is_dead) {
            deathHtml = `
            <div class="death-marker">
                <h3 style="margin:0">FALECIDO HEROICAMENTE NO LV ${char.death_level || char.level}</h3>
                <p style="margin:5px 0 0 0"><b>Causa:</b> ${char.death_cause || 'Desconhecida'} | <b>Local:</b> ${char.death_location || 'Desconhecido'}</p>
            </div>
            `;
        }

        const profs = [];
        if(char.prof1_name) profs.push({name: char.prof1_name, full: char.prof1_300});
        if(char.prof2_name) profs.push({name: char.prof2_name, full: char.prof2_300});
        if(char.sec1_name) profs.push({name: char.sec1_name, full: char.sec1_300});
        if(char.sec2_name) profs.push({name: char.sec2_name, full: char.sec2_300});

        const profsHtml = profs.map(p => `<span class="prof-tag ${p.full ? 'full' : ''}">${p.name}${p.full ? ' (300)' : ''}</span>`).join('');

        container.innerHTML = `
            ${deathHtml}
            <div class="hero-header">
                <img src="${char.image_url || '/assets/branding/contentbra.png'}" class="hero-img">
                <div class="hero-info-top">
                    <p class="eyebrow" style="color: #00ff88; margin-bottom: 10px;">Herói de Brazug</p>
                    <h1>${char.name}</h1>
                    <p>Level ${char.is_dead ? (char.death_level || char.level) : char.level} ${char.class}</p>
                    <p>${char.race} | ${char.guild}</p>
                    <p style="font-size: 14px; margin-top: 10px;">Criado por: <b>${char.owner_username || 'Brazuguer'}</b></p>
                    
                    <div class="social-btns">
                        ${!char.is_dead ? `<a href="https://classic-armory.org/character/us/classic-hardcore/doomhowl/${char.name.toLowerCase()}" target="_blank" class="btn-social" style="background: #00aa66;">Classic Armory</a>` : ''}
                        ${char.twitch_url ? `<a href="${char.twitch_url}" target="_blank" class="btn-social" style="background: #9146ff;">Twitch</a>` : ''}
                        ${char.youtube_url ? `<a href="${char.youtube_url}" target="_blank" class="btn-social" style="background: #ff0000;">YouTube</a>` : ''}
                    </div>
                </div>
            </div>

            <div class="info-card">
                <h2>Profissões</h2>
                <div class="prof-list">${profsHtml || 'Nenhuma registrada'}</div>
            </div>

            <div class="info-card">
                <h2>Lore / Biografia</h2>
                <div class="lore-text">${(char.lore || 'Este herói ainda não registrou sua história...').replace(/\n/g, '<br>')}</div>
            </div>
        `;
    }

    loadDetail();
})();
</script>
</body>
</html>
