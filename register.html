<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro — BRAZUG</title>
    <link rel="stylesheet" href="/css/style.css">
    <link rel="icon" href="/assets/branding/contentbra.png" type="image/png" />
</head>
<body>
    <header class="site-header" id="universal-header"></header>

    <main class="redesign-container" style="max-width: 550px; margin-top: 50px;">
      <div class="panel">
        <div class="corner corner-tl"></div>
        <div class="corner corner-tr"></div>
        <div class="corner corner-bl"></div>
        <div class="corner corner-br"></div>

        <div class="panel-title" style="text-align: center;">Criar Conta</div>
        <div class="panel-subtitle" style="text-align: center;">Junte-se à Horda e comece sua jornada</div>

        <div class="section">
            <form id="register-form" style="display: flex; flex-direction: column; gap: 15px;">
              <div>
                <label>Usuário</label>
                <input type="text" name="username" placeholder="Seu nome na guilda" required>
              </div>
              <div>
                <label>E-mail</label>
                <input type="email" name="email" placeholder="seu@email.com" required>
              </div>
              <div>
                <label>Senha</label>
                <input type="password" name="password" placeholder="••••••••" required>
              </div>
              <button type="submit" class="btn-primary" style="width: 100%; margin-top: 10px;">⚔ Cadastrar</button>
              <p id="register-msg" style="text-align: center; margin-top: 15px; font-weight: bold;" hidden></p>
            </form>
        </div>

        <div class="divider"></div>

        <div class="section" style="text-align: center; font-size: 0.9rem; background: rgba(0,0,0,0.2);">
          <p style="color: var(--text-muted);">
            Já tem uma conta? <a href="/login.html" style="color: var(--gold); font-weight: bold;">Faça login aqui</a>
          </p>
        </div>
      </div>
    </main>

    <script src="/js/header.js"></script>
    <script>
        document.getElementById("register-form").onsubmit = async (e) => {
            e.preventDefault();
            const msg = document.getElementById("register-msg");
            const fd = new FormData(e.target);
            const data = Object.fromEntries(fd.entries());

            try {
                const res = await fetch("/api/auth/register", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify(data)
                });
                const resData = await res.json();
                
                if (res.ok) {
                    msg.style.color = "var(--gold)";
                    msg.textContent = resData.message;
                    msg.hidden = false;
                    e.target.reset();
                } else {
                    throw new Error(resData.error || "Erro ao cadastrar");
                }
            } catch (err) {
                msg.style.color = "var(--horde-red)";
                msg.textContent = err.message;
                msg.hidden = false;
            }
        };
    </script>
</body>
</html>
