<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro — BRAZUG</title>
    <link rel="stylesheet" href="/css/style.css">
    <link rel="icon" href="/assets/branding/contentbra.png" type="image/png" />
</head>
<body>
    <header class="site-header" id="universal-header"></header>

    <main class="container">
      <section class="card" style="max-width: 500px; margin: 50px auto;">
        <h2 class="section-title">Criar Conta</h2>
        <form id="register-form" style="display: flex; flex-direction: column; gap: 15px;">
          <div>
            <label>Usuário</label>
            <input type="text" name="username" required style="width: 100%; padding: 12px; background: #111; border: 1px solid #333; color: #fff; border-radius: 6px;">
          </div>
          <div>
            <label>E-mail</label>
            <input type="email" name="email" required style="width: 100%; padding: 12px; background: #111; border: 1px solid #333; color: #fff; border-radius: 6px;">
          </div>
          <div>
            <label>Senha</label>
            <input type="password" name="password" required style="width: 100%; padding: 12px; background: #111; border: 1px solid #333; color: #fff; border-radius: 6px;">
          </div>
          <div>
            <label>Palavra-passe da Guilda</label>
            <input type="text" name="secret" placeholder="Peça a um Officer" style="width: 100%; padding: 12px; background: #111; border: 1px solid #333; color: #fff; border-radius: 6px;">
          </div>
          <button type="submit" class="discord-btn" style="width: 100%; border: none; cursor: pointer; margin-top: 10px;">Cadastrar</button>
          <p id="register-msg" style="text-align: center; margin-top: 10px;" hidden></p>
          <p style="text-align: center; font-size: 14px; color: #888;">Já tem uma conta? <a href="/login.html" style="color: var(--gold); text-decoration: none;">Faça login</a></p>
        </form>
      </section>
    </main>

    <script src="/js/header.js"></script>
    <script>
        document.getElementById("register-form").onsubmit = async (e) => {
            e.preventDefault();
            const msg = document.getElementById("register-msg");
            const fd = new FormData(e.target);
            const data = Object.fromEntries(fd.entries());

            try {
                const res = await fetch("/api/auth/register", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify(data)
                });
                const resData = await res.json();
                
                if (res.ok) {
                    msg.style.color = "var(--gold)";
                    msg.textContent = resData.message;
                    msg.hidden = false;
                    e.target.reset();
                } else {
                    throw new Error(resData.error || "Erro ao cadastrar");
                }
            } catch (err) {
                msg.style.color = "var(--horde-red)";
                msg.textContent = err.message;
                msg.hidden = false;
            }
        };
    </script>
</body>
</html>
