<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Casa de Leilões — BRAZUG</title>
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="/css/modern-ux.css">
    <link rel="stylesheet" href="/css/auction-house-ui.css">
    <style>
        /* BRAZUG Theme Overrides for AH */
        .ah-window { 
            background: var(--bg-card) !important; 
            border: 1px solid var(--border) !important;
            border-radius: 16px !important;
            box-shadow: 0 10px 40px rgba(0,0,0,0.6) !important;
            overflow: hidden;
        }
        .ah-titlebar { background: rgba(0,0,0,0.4) !important; color: var(--gold) !important; font-weight: 800 !important; }
        .ah-tab { 
            background: rgba(255,255,255,0.05) !important; 
            color: var(--text-muted) !important;
            border: 1px solid var(--border) !important;
            border-radius: 6px !important;
            transition: 0.3s;
        }
        .ah-tab.active, .ah-tab:hover { background: var(--gold) !important; color: #000 !important; border-color: var(--gold) !important; }
        .ah-wow-input { background: #000 !important; border: 1px solid var(--border) !important; color: var(--text) !important; }
        .ah-search-btn { background: var(--gold) !important; color: #000 !important; border-radius: 6px !important; font-weight: 800 !important; }
        .ah-results-panel { background: rgba(0,0,0,0.2) !important; border: 1px solid var(--border) !important; }
        .ah-col-headers { background: rgba(196, 30, 58, 0.1) !important; color: var(--gold) !important; }
    </style>
</head>
<body>
<header class="site-header" id="universal-header"></header>
<main class="container">
    
    <div style="max-width: 900px; margin: 0 auto 30px auto; text-align: center;">
        <h1 class="section-title">Casa de Leilões</h1>
        <p class="lead">O mercado onde a fortuna muda de mãos.</p>
    </div>

    <div class="ah-window" id="ahWindow">
        <!-- TAB: BROWSE (Comprar) -->
        <div id="tab-browse-content">
            <!-- Search bar -->
            <div class="ah-searchbar">
                <div class="ah-field-group">
                    <span class="ah-field-label">Nome</span>
                    <input class="ah-wow-input ah-input-name" type="text" id="filter_name" placeholder="">
                </div>

                <div class="ah-field-group">
                    <span class="ah-field-label">Level</span>
                    <div style="display:flex;align-items:center;gap:3px">
                        <input class="ah-wow-input ah-input-lvl" type="number" id="min_lvl" placeholder="Min">
                        <span style="color:var(--ah-text-dim); font-size:10px;">-</span>
                        <input class="ah-wow-input ah-input-lvl" type="number" id="max_lvl" placeholder="Max">
                    </div>
                </div>

                <div class="ah-field-group">
                    <span class="ah-field-label">Raridade</span>
                    <select class="ah-select-rarity" id="filter_quality">
                        <option value="">Todas</option>
                        <option value="poor">Pobre</option>
                        <option value="common">Comum</option>
                        <option value="uncommon">Incomum</option>
                        <option value="rare">Raro</option>
                        <option value="epic">Épico</option>
                    </select>
                </div>

                <button class="ah-search-btn" id="btn-search">Buscar</button>
                <button class="ah-search-btn" style="background: linear-gradient(180deg, #2a2010 0%, #1a1408 100%); border-color: var(--ah-panel-border);" onclick="SalesController.resetSearch()">Reset</button>
            </div>

            <!-- Main body -->
            <div class="ah-main-body">
                <!-- Sidebar -->
                <aside class="ah-sidebar">
                    <button class="ah-cat-btn active" data-cat="" onclick="SalesController.setCategory(this, '')">Tudo</button>
                    <button class="ah-cat-btn" data-cat="weapons" onclick="SalesController.setCategory(this, 'weapons')">Armas</button>
                    <button class="ah-cat-btn" data-cat="armor" onclick="SalesController.setCategory(this, 'armor')">Armaduras</button>
                    <button class="ah-cat-btn" data-cat="consumables" onclick="SalesController.setCategory(this, 'consumables')">Consumíveis</button>
                    <button class="ah-cat-btn" data-cat="misc" onclick="SalesController.setCategory(this, 'misc')">Diversos</button>
                </aside>

                <!-- Results -->
                <div class="ah-results-panel">
                    <div class="ah-col-headers">
                        <div class="ah-col-hdr">Item</div>
                        <div class="ah-col-hdr">Lvl</div>
                        <div class="ah-col-hdr">Tempo</div>
                        <div class="ah-col-hdr">Vendedor</div>
                        <div class="ah-col-hdr">Preço</div>
                        <div class="ah-col-hdr">Ação</div>
                    </div>
                    <div class="ah-results-list" id="sales-container">
                        <div style="display:flex; align-items:center; justify-content:center; height:100%; color:var(--ah-gold); font-style:italic;">
                            Escolha os filtros e clique em "Buscar"
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- TAB: AUCTIONS (Vender/Anunciar) -->
        <div id="tab-auctions-content" style="display: none;">
            <!-- Search bar -->
            <div class="ah-searchbar" style="padding-left: 10px; display: flex; justify-content: space-between; align-items: center;">
                <div style="display: flex; gap: 10px; align-items: center;">
                    <div class="ah-field-group">
                        <span class="ah-field-label">Buscar Item</span>
                        <input class="ah-wow-input ah-input-name" type="text" id="sell_filter_name" placeholder="Nome...">
                    </div>
                    <button class="ah-search-btn" id="btn-search-sell">Buscar</button>
                </div>
                <!-- Pagination placeholder to be populated by JS -->
                <div id="sell-pagination-container"></div>
            </div>
            
            <div class="ah-main-body" style="height: 350px;">
                <div class="ah-results-panel">
                    <div class="ah-col-headers" style="display: grid; grid-template-columns: 1fr auto;">
                        <div class="ah-col-hdr">Item</div>
                        <div class="ah-col-hdr" style="text-align: right;">Ação</div>
                    </div>
                    <div class="ah-results-list" id="sell-items-container">
                        <div style="padding: 20px; color: var(--ah-gold); text-align: center; font-style: italic;">
                            Busque um item para iniciar o anúncio.
                        </div>
                    </div>
                </div>
            </div>

            <!-- Creation Form (Simplified) -->
            <div style="padding: 15px; background: rgba(0,0,0,0.4); border-top: 1px solid var(--ah-panel-border);">
                <div style="display: grid; gap: 10px; justify-content: center;">
                    <div class="ah-field-group">
                        <span class="ah-field-label">Item Selecionado</span>
                        <input type="text" id="sell_item_name" class="ah-wow-input" disabled style="width: 300px;">
                        <input type="hidden" id="sell_item_id">
                    </div>
                    
                    <div style="display: flex; gap: 10px;">
                        <div class="ah-field-group">
                            <span class="ah-field-label">Ouro <span class="coin-g" style="font-size:12px;">g</span></span>
                            <input type="number" id="sell_gold" class="ah-wow-input" style="width: 60px;" disabled>
                        </div>
                        <div class="ah-field-group">
                            <span class="ah-field-label">Prata <span class="coin-s" style="font-size:12px;">s</span></span>
                            <input type="number" id="sell_silver" class="ah-wow-input" style="width: 60px;" disabled>
                        </div>
                        <div class="ah-field-group">
                            <span class="ah-field-label">Cobre <span class="coin-c" style="font-size:12px;">c</span></span>
                            <input type="number" id="sell_copper" class="ah-wow-input" style="width: 60px;" disabled>
                        </div>
                        <div class="ah-field-group">
                            <span class="ah-field-label">Qtd</span>
                            <input type="number" id="sell_quantity" class="ah-wow-input" style="width: 60px;" disabled>
                        </div>
                        <div class="ah-field-group">
                            <span class="ah-field-label">Duração</span>
                            <select id="sell_duration" class="ah-select-rarity" disabled style="width: 100px;">
                                <option value="12">12 Horas</option>
                                <option value="24" selected>24 Horas</option>
                                <option value="48">48 Horas</option>
                            </select>
                        </div>
                    </div>
                    
                    <button id="btn-create-sale" class="ah-search-btn" disabled style="margin-top: 10px;">ANUNCIAR</button>
                </div>
            </div>
        </div>

        <!-- TAB: BIDS (Lances/Notificações) -->
        <div id="tab-bids-content" style="display: none; padding: 20px;">
             <div class="ah-results-panel" style="height: 400px; border: 1px solid var(--ah-panel-border);">
                 <div class="ah-col-headers" style="grid-template-columns: 1fr 1fr 1fr 1fr;">
                    <div class="ah-col-hdr">Item</div>
                    <div class="ah-col-hdr">Licitante</div>
                    <div class="ah-col-hdr">Valor</div>
                    <div class="ah-col-hdr">Data</div>
                 </div>
                 <div class="ah-results-list" id="notifications-container">
                     <!-- Notifications go here -->
                 </div>
             </div>
        </div>

        <!-- Status bar -->
        <div class="ah-statusbar">
            <span id="statusText">Pronto</span>
            <span id="countText"></span>
        </div>
    </div>

    <!-- Tabs at the bottom -->
    <div class="ah-tabs" style="max-width: 900px; margin: -20px auto 40px auto;">
        <button class="ah-tab active" id="tab-browse" onclick="SalesController.switchTab('browse')">Comprar</button>
        <button class="ah-tab" id="tab-bids" onclick="SalesController.switchTab('bids')">Meus Lances</button>
        <button class="ah-tab" id="tab-auctions" onclick="SalesController.switchTab('auctions')">Anunciar</button>
    </div>

</main>

<!-- Tooltip -->
<div class="ah-tooltip" id="tooltip"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/dompurify/3.0.9/purify.min.js"></script>
<script src="/js/header.js"></script>
<script src="/js/controllers/SalesController.js"></script>
</body>
</html>
