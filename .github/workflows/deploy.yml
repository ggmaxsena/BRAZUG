# Deploy Node na Hostinger (VPS / SSH + PM2).
#
# Secrets: SSH_HOST, SSH_USER, SSH_PRIVATE_KEY, DEPLOY_PATH,
#          TWITCH_CLIENT_ID, TWITCH_CLIENT_SECRET, MONGODB_URI
# Opcional: SSH_PORT, APP_PORT, ADMIN_PASSWORD, MONGODB_DB,
#           MONGODB_URI_STANDARD (recomendado na Hostinger se SRV falhar)

name: Deploy (Hostinger)

on:
  push:
    branches: [main, master]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Enviar arquivos (SCP)
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT || 22 }}
          source: "index.html,admin.html,server.js,package.json,package-lock.json,ecosystem.config.cjs,css,js,lib,assets,data"
          target: ${{ secrets.DEPLOY_PATH }}
          rm: false

      - name: Reiniciar app Node (PM2)
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT || 22 }}
          script_stop: true
          script: |
            set -e
            cd "${{ secrets.DEPLOY_PATH }}"
            umask 077
            touch .env
            set_env() {
              key="$1"
              val="$2"
              [ -z "$val" ] && return 0
              if grep -q "^${key}=" .env 2>/dev/null; then
                sed -i.bak "s|^${key}=.*|${key}=${val}|" .env && rm -f .env.bak
              else
                printf '%s=%s\n' "$key" "$val" >> .env
              fi
            }
            set_env TWITCH_CLIENT_ID "${{ secrets.TWITCH_CLIENT_ID }}"
            set_env TWITCH_CLIENT_SECRET "${{ secrets.TWITCH_CLIENT_SECRET }}"
            set_env MONGODB_URI "${{ secrets.MONGODB_URI }}"
            set_env MONGODB_URI_STANDARD "${{ secrets.MONGODB_URI_STANDARD }}"
            set_env MONGODB_DB "${{ secrets.MONGODB_DB }}"
            set_env ADMIN_PASSWORD "${{ secrets.ADMIN_PASSWORD }}"
            set_env PORT "${{ secrets.APP_PORT || '3000' }}"
            set_env NODE_ENV production
            chmod 600 .env
            export PATH="$HOME/.nvm/versions/node/$(ls $HOME/.nvm/versions/node 2>/dev/null | tail -1)/bin:$PATH:/usr/local/bin:$PATH"
            if ! command -v node >/dev/null 2>&1; then
              echo "Node não encontrado. Instale Node 18+ na Hostinger."
              exit 1
            fi
            node --version
            npm ci --omit=dev 2>/dev/null || npm install --omit=dev
            npm run check
            if command -v pm2 >/dev/null 2>&1; then
              pm2 reload ecosystem.config.cjs --update-env || pm2 start ecosystem.config.cjs
              pm2 save
            else
              nohup node server.js >> app.log 2>&1 &
            fi
