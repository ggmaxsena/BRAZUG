<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recuperar Senha — BRAZUG</title>
    <link rel="stylesheet" href="/css/style.css">
    <link rel="icon" href="/assets/branding/contentbra.png" type="image/png" />
</head>
<body>
    <header class="site-header" id="universal-header"></header>

    <main class="container">
      <section class="card" style="max-width: 500px; margin: 50px auto;">
        <h2 class="section-title">Recuperar Senha</h2>
        <p style="color: var(--text-muted); margin-bottom: 20px;">Insira seu e-mail abaixo para receber um link de redefinição de senha.</p>
        <form id="forgot-form" style="display: flex; flex-direction: column; gap: 15px;">
          <div>
            <label>E-mail</label>
            <input type="email" name="email" required style="width: 100%; padding: 12px; background: #111; border: 1px solid #333; color: #fff; border-radius: 6px;">
          </div>
          <button type="submit" class="discord-btn" style="width: 100%; border: none; cursor: pointer; margin-top: 10px;">Enviar Link</button>
          <p id="forgot-msg" style="text-align: center; margin-top: 10px;" hidden></p>
          <p style="text-align: center; font-size: 14px; color: #888; margin-top: 15px;"><a href="/login.html" style="color: var(--gold); text-decoration: none;">Voltar para o Login</a></p>
        </form>
      </section>
    </main>

    <script src="/js/header.js"></script>
    <script>
        document.getElementById("forgot-form").onsubmit = async (e) => {
            e.preventDefault();
            const msg = document.getElementById("forgot-msg");
            const fd = new FormData(e.target);

            try {
                const res = await fetch("/api/auth/forgot-password", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ email: fd.get("email") })
                });
                const resData = await res.json();
                
                msg.style.color = res.ok ? "var(--gold)" : "var(--horde-red)";
                msg.textContent = resData.message || resData.error;
                msg.hidden = false;
                if (res.ok) e.target.reset();
            } catch (err) {
                msg.style.color = "var(--horde-red)";
                msg.textContent = "Erro na conexão.";
                msg.hidden = false;
            }
        };
    </script>
</body>
</html>
