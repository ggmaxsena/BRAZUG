<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Acesso — BRAZUG</title>
    <link rel="stylesheet" href="/css/style.css" />
    <link rel="icon" href="/assets/branding/contentbra.png" type="image/png" />
  </head>
  <body>
    <header class="site-header" id="universal-header"></header>

    <main class="container">
      <section class="card" style="max-width: 500px; margin: 0 auto">
        <h1 class="section-title" style="text-align: center">Entrar na Guilda</h1>
        <p class="subtitle" style="text-align: center; margin-bottom: 20px; color: var(--text-muted)">
          Bem-vindo de volta, aventureiro.
        </p>

        <form id="login-form" style="display: flex; flex-direction: column; gap: 20px">
          <div>
            <label style="color: var(--gold); font-weight: bold; display: block; margin-bottom: 5px">Usuário</label>
            <input
              type="text"
              id="login-username"
              required
              autocomplete="username"
              placeholder="Seu nome na guilda"
              style="
                width: 100%;
                padding: 12px;
                background: #111;
                border: 1px solid #333;
                color: #fff;
                border-radius: 6px;
              "
            />
          </div>
          <div>
            <label style="color: var(--gold); font-weight: bold; display: block; margin-bottom: 5px">Senha</label>
            <input
              type="password"
              id="login-password"
              required
              autocomplete="current-password"
              placeholder="••••••••"
              style="
                width: 100%;
                padding: 12px;
                background: #111;
                border: 1px solid #333;
                color: #fff;
                border-radius: 6px;
              "
            />
          </div>
          <button type="submit" class="discord-btn" id="login-btn" style="border: none; width: 100%; cursor: pointer">
            Acessar Perfil
          </button>
        </form>

        <p id="auth-error" style="color: #ff4444; margin-top: 15px; text-align: center" hidden></p>
        <div id="resend-verification-container" style="margin-top: 15px; text-align: center;" hidden>
            <p id="resend-info" style="color: #ccc; margin-bottom: 10px;"></p>
            <button id="resend-btn" class="discord-btn" style="border: none; padding: 8px 15px; font-size: 0.8rem; cursor: pointer;">
                Reenviar E-mail de Verificação
            </button>
        </div>

        <div style="margin-top: 25px; text-align: center; font-size: 0.9rem">
          <p style="margin-bottom: 10px;">
            <a href="/forgot-password.html" style="color: var(--gold); text-decoration: none;">Esqueci minha senha</a>
          </p>
          <p>
            Não possui cadastro? <a href="/register.html" style="color: var(--gold)">Cadastre-se aqui</a>
          </p>
        </div>
      </section>
    </main>

    <script>
      (function () {
        var loginForm = document.getElementById('login-form');
        var loginBtn = document.getElementById('login-btn');
        var authError = document.getElementById('auth-error');
        var resendContainer = document.getElementById('resend-verification-container');
        var resendBtn = document.getElementById('resend-btn');
        var resendInfo = document.getElementById('resend-info');
        
        var pendingVerificationEmail = '';

        loginForm.addEventListener('submit', async function (e) {
          e.preventDefault();
          authError.hidden = true;
          resendContainer.hidden = true;
          loginBtn.textContent = 'Autenticando...';
          loginBtn.disabled = true;

          try {
            // Supondo que o endpoint de login esteja em /api/auth/login, verifique se /api/admin/login é o correto
            var res = await fetch('/api/auth/login', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({
                username: document.getElementById('login-username').value,
                password: document.getElementById('login-password').value,
              }),
            });

            var data = await res.json();
            if (!res.ok) {
                if (data.needs_verification) {
                    pendingVerificationEmail = data.email;
                    resendInfo.textContent = "Sua conta ainda não foi ativada. Verifique seu e-mail ou reenvie a mensagem.";
                    resendContainer.hidden = false;
                }
                throw new Error(data.error || 'Login falhou');
            }

            localStorage.setItem('brazug_admin_token', data.token);
            localStorage.setItem('brazug_admin_role', data.user.role);
            localStorage.setItem('brazug_admin_user', data.user.username);

            window.location.href = '/perfil.html';
          } catch (err) {
            authError.textContent = err.message;
            authError.hidden = false;
            loginBtn.textContent = 'Acessar Perfil';
            loginBtn.disabled = false;
          }
        });

        resendBtn.addEventListener('click', async function() {
            resendBtn.disabled = true;
            resendBtn.textContent = 'Enviando...';
            try {
                var res = await fetch('/api/auth/resend-verification', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email: pendingVerificationEmail })
                });
                var data = await res.json();
                resendInfo.textContent = data.message || data.error;
                resendBtn.hidden = true;
            } catch (err) {
                resendInfo.textContent = 'Erro ao reenviar.';
                resendBtn.disabled = false;
            }
        });
      })();
    </script>
    <script src="/js/header.js"></script>
  </body>
</html>
